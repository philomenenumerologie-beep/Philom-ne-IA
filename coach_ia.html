<!DOCTYPE html>

<html lang="fr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Coach IA — Assistant Football</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
:root {
  --green-bright: #2ea043;
  --green2: #3fb950;
  --green-glow: rgba(46,160,67,0.3);
  --white: #ffffff;
  --text: #e6edf3;
  --dim: #a0b0a0;
  --surface: rgba(10,20,10,0.82);
  --surface2: rgba(0,20,0,0.92);
  --border: rgba(255,255,255,0.12);
}

- { box-sizing: border-box; margin: 0; padding: 0; }

body {
color: var(–text);
font-family: ‘DM Sans’, sans-serif;
height: 100vh;
display: flex;
flex-direction: column;
overflow: hidden;
position: relative;
}

#pitch {
position: fixed; inset: 0; z-index: 0; overflow: hidden;
}
.pitch-bg {
width: 100%; height: 100%;
background: repeating-linear-gradient(180deg, #1a4a1a 0px, #1a4a1a 40px, #1e5c1e 40px, #1e5c1e 80px);
}
.pitch-svg { position: absolute; inset: 0; width: 100%; height: 100%; }
#overlay { position: fixed; inset: 0; z-index: 1; background: rgba(0,10,0,0.45); }

/* LOGIN */
#loginScreen {
position: fixed; inset: 0; z-index: 100;
display: flex; flex-direction: column;
align-items: center; justify-content: center; padding: 24px;
}
.login-card {
background: rgba(255,255,255,0.12);
border: 1px solid rgba(255,255,255,0.3);
border-radius: 20px; padding: 28px 24px;
width: 100%; max-width: 380px;
box-shadow: 0 20px 40px rgba(0,0,0,0.5);
backdrop-filter: blur(20px);
}
.login-logo { text-align: center; margin-bottom: 24px; }
.login-ball { font-size: 48px; display: block; margin-bottom: 8px; }
.login-title {
font-family: ‘Barlow Condensed’, sans-serif;
font-size: 28px; font-weight: 800; color: #fff;
text-transform: uppercase; letter-spacing: 0.05em;
}
.login-sub { font-size: 13px; color: #c8e6c8; margin-top: 4px; }
.login-label { display: block; font-size: 13px; color: #c8e6c8; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.08em; }
.login-input {
width: 100%; background: rgba(255,255,255,0.15);
border: 1px solid rgba(255,255,255,0.3); border-radius: 12px;
padding: 14px 16px; color: #fff; -webkit-text-fill-color: #fff;
font-size: 16px; font-family: ‘DM Sans’, sans-serif;
outline: none; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 16px;
}
.login-input::placeholder { text-transform: none; letter-spacing: 0; color: rgba(255,255,255,0.5); }
.login-btn {
width: 100%; padding: 14px; background: var(–green-bright);
border: none; border-radius: 12px; color: #fff;
font-size: 16px; font-weight: 600; font-family: ‘DM Sans’, sans-serif;
cursor: pointer; box-shadow: 0 4px 16px var(–green-glow);
}
.login-error {
margin-top: 12px; padding: 10px 14px;
background: rgba(248,81,73,0.1); border: 1px solid rgba(248,81,73,0.3);
border-radius: 10px; color: #f85149; font-size: 13px; text-align: center; display: none;
}
.login-demo { margin-top: 16px; text-align: center; font-size: 12px; color: #c8e6c8; }
.login-demo span { color: var(–green2); cursor: pointer; text-decoration: underline; }

/* TOPBAR */
#topbar {
position: relative; z-index: 10;
display: flex; align-items: center; justify-content: space-between;
padding: 12px 16px;
background: linear-gradient(135deg, rgba(0,40,0,0.98), rgba(0,70,0,0.98));
backdrop-filter: blur(12px);
border-bottom: 2px solid rgba(46,160,67,0.6);
box-shadow: 0 4px 20px rgba(0,0,0,0.6);
}
.logo-area { display: flex; align-items: center; gap: 12px; }
.ball-icon {
width: 40px; height: 40px; border-radius: 50%;
background: rgba(0,0,0,0.4); border: 1.5px solid var(–green-bright);
display: flex; align-items: center; justify-content: center;
font-size: 20px; box-shadow: 0 0 14px var(–green-glow);
}
.logo-text { display: flex; flex-direction: column; }
.logo-name {
font-family: ‘Barlow Condensed’, sans-serif;
font-size: 18px; font-weight: 800; color: #fff;
letter-spacing: 0.08em; text-transform: uppercase; line-height: 1.1;
text-shadow: 0 0 10px rgba(46,160,67,0.8);
}
.logo-sub { font-size: 12px; color: #4ade80; letter-spacing: 0.1em; text-transform: uppercase; font-weight: 600; }
.status { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(–dim); }
.dot-green {
width: 7px; height: 7px; border-radius: 50%;
background: var(–green2); box-shadow: 0 0 6px var(–green2);
animation: pulse 2s infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

/* CATEGORIES */
#catBar {
position: relative; z-index: 9;
display: flex; gap: 8px; padding: 10px 14px;
background: rgba(5,15,5,0.75); backdrop-filter: blur(8px);
border-bottom: 1px solid rgba(255,255,255,0.08);
overflow-x: auto; scrollbar-width: none;
}
#catBar::-webkit-scrollbar { display: none; }
.cat-chip {
padding: 6px 14px; border-radius: 20px;
background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);
color: var(–dim); font-family: ‘Barlow Condensed’, sans-serif;
font-size: 14px; font-weight: 600; letter-spacing: 0.05em;
cursor: pointer; white-space: nowrap; transition: all 0.2s;
}
.cat-chip.active { background: var(–green-bright); border-color: var(–green-bright); color: #fff; }

/* CHAT */
#chat { flex: 1; overflow-y: auto; padding: 16px 14px 120px; position: relative; z-index: 2; }
#chat::-webkit-scrollbar { width: 3px; }
#chat::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

.bubble-wrap { display: flex; margin-bottom: 14px; animation: fadeUp 0.3s ease; }
@keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
.bubble-wrap.bot { justify-content: flex-start; }
.bubble-wrap.user { justify-content: flex-end; }

.avatar {
width: 30px; height: 30px; border-radius: 50%;
background: rgba(0,0,0,0.5); border: 1px solid var(–green-bright);
display: flex; align-items: center; justify-content: center;
flex-shrink: 0; margin-right: 8px; margin-top: 2px; font-size: 14px;
}
.bubble {
max-width: min(85%, 360px); padding: 11px 14px; border-radius: 16px;
font-size: 14px; line-height: 1.6;
}
.bubble.bot {
background: rgba(0,20,0,0.92); border: 1px solid rgba(46,160,67,0.25);
border-top-left-radius: 4px; backdrop-filter: blur(8px);
color: #fff; -webkit-text-fill-color: #fff;
}
.bubble.user {
background: rgba(20,50,20,0.9); border: 1px solid rgba(46,160,67,0.3);
border-top-right-radius: 4px; color: #fff; -webkit-text-fill-color: #fff;
}

.quick-actions { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
.qa-btn {
padding: 8px 14px; background: rgba(255,255,255,0.08);
border: 1px solid rgba(255,255,255,0.15); border-radius: 20px;
color: #fff; font-size: 13px; cursor: pointer; font-family: ‘DM Sans’, sans-serif;
}

/* SCHÉMA */
.schema-container {
margin-top: 12px;
background: rgba(0,40,0,0.7);
border: 1px solid rgba(46,160,67,0.4);
border-radius: 12px; padding: 10px;
}
.schema-title {
font-size: 11px; color: #4ade80; text-transform: uppercase;
letter-spacing: 0.1em; margin-bottom: 8px; font-weight: 600;
}
.schema-svg { width: 100%; display: block; border-radius: 8px; }

.typing { display:flex; gap:4px; padding:12px 14px; }
.typing span {
width:6px; height:6px; border-radius:50%; background:var(–dim);
animation: bounce 1.2s infinite;
}
.typing span:nth-child(2){animation-delay:0.2s}
.typing span:nth-child(3){animation-delay:0.4s}
@keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-6px)}}

/* COMPOSER */
#composer {
position: fixed; bottom: 0; left: 0; right: 0; z-index: 10;
padding: 10px 12px 18px;
background: linear-gradient(to top, rgba(5,15,5,0.95) 70%, transparent);
}
.composer-inner {
display: flex; align-items: center; gap: 8px;
background: var(–surface2); border: 1px solid rgba(255,255,255,0.12);
border-radius: 22px; padding: 8px 12px; backdrop-filter: blur(10px);
}
#userInput {
flex: 1; background: transparent; border: none; outline: none;
color: #fff; -webkit-text-fill-color: #fff;
font-size: 15px; font-family: ‘DM Sans’, sans-serif;
}
#userInput::placeholder { color: var(–dim); -webkit-text-fill-color: var(–dim); }
.send-btn {
width: 38px; height: 38px; border-radius: 50%;
background: var(–green-bright); border: none; color: #fff;
font-size: 16px; display: flex; align-items: center; justify-content: center;
cursor: pointer; box-shadow: 0 4px 12px var(–green-glow); flex-shrink: 0;
}
</style>

</head>

  <svg class="pitch-svg" viewBox="0 0 400 700" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
    <rect x="20" y="20" width="360" height="660" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="2"/>

    <rect x="140" y="645" width="120" height="35" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>

<header id="topbar">

<!-- CATEGORIES -->

<div id="catBar">

  <div class="cat-chip active" onclick="selectCat(this,'U8/U9')">U8/U9</div>
  <div class="cat-chip" onclick="selectCat(this,'U10/U11')">U10/U11</div>
  <div class="cat-chip" onclick="selectCat(this,'U12/U13')">U12/U13</div>
  <div class="cat-chip" onclick="selectCat(this,'U14/U15')">U14/U15</div>
  <div class="cat-chip" onclick="selectCat(this,'U16/U17')">U16/U17</div>

    <button class="send-btn" id="sendBtn">➤</button>

<script>
const API_BASE = "https://philo-backend-by2c.onrender.com";
const COACH_URL = API_BASE + "/coach";

let clubKey = localStorage.getItem("coach_club_key") || "";
let deviceId = localStorage.getItem("coach_device_id");
if (!deviceId) {
  deviceId = "device_" + Math.random().toString(36).slice(2, 12);
  localStorage.setItem("coach_device_id", deviceId);
}
let categorie = "U8/U9";
let userId = "coach_" + (localStorage.getItem("coach_user_id") || Math.random().toString(36).slice(2,10));
localStorage.setItem("coach_user_id", userId.replace("coach_",""));
let isLoading = false;

// ===== SCHÉMAS SVG =====
function generateSchema(type, players, distance) {
  const W = 280, H = 200;
  const cx = W/2, cy = H/2;
  const d = distance || 7;
  const px = d * 12; // pixels par mètre

  let elements = [];

  // Fond terrain
  elements.push('<rect width="' + W + '" height="' + H + '" fill="#1a4a1a" rx="8"/>');
  elements.push('<rect x="10" y="10" width="' + (W-20) + '" height="' + (H-20) + '" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1.5" rx="4"/>');

  const plotColor = "#f0d080";
  const playerColor = "#2ea043";
  const arrowColor = "#4ade80";
  const distColor = "#ffffff";

  function plot(x, y) {
    return '<rect x="' + (x-5) + '" y="' + (y-5) + '" width="10" height="10" fill="' + plotColor + '" rx="2"/>';
  }
  function player(x, y, num) {
    return '<circle cx="' + x + '" cy="' + y + '" r="12" fill="' + playerColor + '" stroke="#fff" stroke-width="1.5"/>' +
           '<text x="' + x + '" y="' + (y+4) + '" text-anchor="middle" font-size="10" font-weight="bold" fill="#fff">' + num + '</text>';
  }
  function arrow(x1, y1, x2, y2) {
    const dx = x2-x1, dy = y2-y1;
    const len = Math.sqrt(dx*dx+dy*dy);
    const mx = x1+dx*0.7, my = y1+dy*0.7;
    return '<line x1="' + x1 + '" y1="' + y1 + '" x2="' + mx + '" y2="' + my + '" stroke="' + arrowColor + '" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arr)"/>';
  }
  function distLabel(x, y, text) {
    return '<text x="' + x + '" y="' + y + '" text-anchor="middle" font-size="9" fill="' + distColor + '" opacity="0.8">' + text + '</text>';
  }

  const defs = '<defs><marker id="arr" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="' + arrowColor + '"/></marker></defs>';
  elements.push(defs);

  if (type === "triangle") {
    const p1 = [cx, 40];
    const p2 = [cx - px*0.866, cy + px*0.5];
    const p3 = [cx + px*0.866, cy + px*0.5];
    elements.push(plot(p1[0], p1[1]));
    elements.push(plot(p2[0], p2[1]));
    elements.push(plot(p3[0], p3[1]));
    elements.push(player(p1[0], p1[1], "J1"));
    elements.push(player(p2[0], p2[1], "J2"));
    elements.push(player(p3[0], p3[1], "J3"));
    elements.push(arrow(p1[0], p1[1]+14, p2[0], p2[1]-14));
    elements.push(arrow(p2[0]+10, p2[1]-5, p3[0]-10, p3[1]-5));
    elements.push(arrow(p3[0], p3[1]-14, p1[0], p1[1]+14));
    elements.push(distLabel(cx, cy + px*0.5 + 20, d + "m entre les plots"));

  } else if (type === "ligne") {
    const spacing = Math.min(px, 50);
    const nb = Math.min(players || 4, 5);
    const startX = cx - (nb-1)*spacing/2;
    for (let i = 0; i < nb; i++) {
      const x = startX + i*spacing;
      elements.push(plot(x, cy - 20));
      elements.push(player(x, cy + 20, "J"+(i+1)));
      if (i > 0) elements.push(arrow(startX+(i-1)*spacing+12, cy+20, x-12, cy+20));
    }
    elements.push(distLabel(cx, cy + 55, d + "m entre joueurs"));

  } else if (type === "carre") {
    const half = Math.min(px*0.6, 70);
    const corners = [
      [cx-half, cy-half], [cx+half, cy-half],
      [cx+half, cy+half], [cx-half, cy+half]
    ];
    corners.forEach((c, i) => {
      elements.push(plot(c[0], c[1]));
      elements.push(player(c[0], c[1], "J"+(i+1)));
    });
    elements.push(arrow(corners[0][0]+12, corners[0][1], corners[1][0]-12, corners[1][1]));
    elements.push(arrow(corners[1][0], corners[1][1]+12, corners[2][0], corners[2][1]-12));
    elements.push(arrow(corners[2][0]-12, corners[2][1], corners[3][0]+12, corners[3][1]));
    elements.push(arrow(corners[3][0], corners[3][1]-12, corners[0][0], corners[0][1]+12));
    elements.push(distLabel(cx, cy+half+22, d + "m de côté"));

  } else if (type === "slalom") {
    const nbPlots = 5;
    const espacement = Math.min(px*0.5, 35);
    const startY = 40;
    for (let i = 0; i < nbPlots; i++) {
      const x = i % 2 === 0 ? cx - 20 : cx + 20;
      elements.push(plot(x, startY + i*espacement));
    }
    elements.push(player(cx, H-30, "J1"));
    elements.push('<path d="M' + cx + ' ' + (H-42) + ' Q' + (cx+20) + ' ' + (startY+4*espacement) + ' ' + (cx-20) + ' ' + (startY+3*espacement) + ' Q' + (cx+20) + ' ' + (startY+2*espacement) + ' ' + (cx-20) + ' ' + (startY+espacement) + ' Q' + (cx+20) + ' ' + (startY) + ' ' + cx + ' ' + startY + '" fill="none" stroke="' + arrowColor + '" stroke-width="2" stroke-dasharray="5,3"/>');
    elements.push(distLabel(cx+50, cy, d + "m"));

  } else {
    // Défaut : rondo
    const r = Math.min(px*0.7, 65);
    const nb = Math.min(players || 4, 6);
    for (let i = 0; i < nb; i++) {
      const angle = (i/nb)*Math.PI*2 - Math.PI/2;
      const x = cx + r*Math.cos(angle);
      const y = cy + r*Math.sin(angle);
      elements.push(player(x, y, "J"+(i+1)));
    }
    elements.push('<circle cx="' + cx + '" cy="' + cy + '" r="' + r + '" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1" stroke-dasharray="5,5"/>');
    elements.push(distLabel(cx, H-15, "Rayon " + d + "m"));
  }

  return '<svg class="schema-svg" viewBox="0 0 ' + W + ' ' + H + '" xmlns="http://www.w3.org/2000/svg">' + elements.join("") + '</svg>';
}

function detectSchema(text) {
  const t = text.toLowerCase();
  let type = "rondo";
  let distance = 7;
  let players = 4;

  if (t.includes("triangle")) type = "triangle";
  else if (t.includes("slalom")) type = "slalom";
  else if (t.includes("carré") || t.includes("carre") || t.includes("carré")) type = "carre";
  else if (t.includes("ligne") || t.includes("file")) type = "ligne";
  else if (t.includes("rondo") || t.includes("possession")) type = "rondo";

  const mMatch = t.match(/(\d+)\s*m[èe]tre/);
  const mShort = t.match(/(\d+)\s*m\b/);
  if (mMatch) distance = parseInt(mMatch[1]);
  else if (mShort) distance = parseInt(mShort[1]);

  const jMatch = t.match(/(\d+)\s*joueur/);
  if (jMatch) players = parseInt(jMatch[1]);

  return { type, distance, players };
}

// ===== LOGIN =====
const loginScreen = document.getElementById("loginScreen");
const loginBtn = document.getElementById("loginBtn");
const clubKeyInput = document.getElementById("clubKeyInput");
const loginError = document.getElementById("loginError");

function useDemoKey() { clubKeyInput.value = "DEMO-CLUB-0000"; }

async function tryLogin() {
  const key = clubKeyInput.value.trim().toUpperCase();
  if (!key) { showLoginError("Entrez votre clé."); return; }
  loginBtn.textContent = "Vérification…";
  loginBtn.disabled = true;
  loginError.style.display = "none";
  try {
    const resp = await fetch(COACH_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message: "Bonjour", userId, categorie, clubKey: key, deviceId })
    });
    const data = await resp.json();
    if (!resp.ok) {
      showLoginError(data.error || "Clé invalide.");
      loginBtn.textContent = "Accéder ⚽";
      loginBtn.disabled = false;
      return;
    }
    clubKey = key;
    localStorage.setItem("coach_club_key", clubKey);
    loginScreen.style.display = "none";
    if (data.club) document.getElementById("clubName").textContent = data.club;
    addBotMsg("Bonjour coach ! 👋 Je suis votre assistant " + categorie + ".\n\nDites-moi ce que vous voulez travailler et j'adapte la séance complète avec schémas !", true);
  } catch {
    showLoginError("Erreur de connexion.");
    loginBtn.textContent = "Accéder ⚽";
    loginBtn.disabled = false;
  }
}

function showLoginError(msg) { loginError.textContent = msg; loginError.style.display = "block"; }
loginBtn.addEventListener("click", tryLogin);
clubKeyInput.addEventListener("keydown", e => { if (e.key === "Enter") tryLogin(); });
if (clubKey) { clubKeyInput.value = clubKey; tryLogin(); }

function selectCat(el, cat) {
  document.querySelectorAll(".cat-chip").forEach(c => c.classList.remove("active"));
  el.classList.add("active");
  categorie = cat;
  addBotMsg("Catégorie : " + cat + " ⚽ Je m'adapte !");
}

// ===== CHAT =====
const chat = document.getElementById("chat");
const messages = document.getElementById("messages");

function addBotMsg(text, withActions) {
  const wrap = document.createElement("div");
  wrap.className = "bubble-wrap bot";
  const bubble = document.createElement("div");
  bubble.className = "bubble bot";
  bubble.style.whiteSpace = "pre-wrap";
  bubble.textContent = text;

  if (withActions) {
    const actions = document.createElement("div");
    actions.className = "quick-actions";
    actions.innerHTML =
      '<button class="qa-btn" onclick="sendMessage(\'Seance dribble 12 joueurs U8 1h\')">🏃 Dribble</button>' +
      '<button class="qa-btn" onclick="sendMessage(\'Seance passe triangle 10 joueurs 45min\')">⚡ Passe</button>' +
      '<button class="qa-btn" onclick="sendMessage(\'Seance tir au but 14 joueurs 1h\')">🎯 Tir</button>' +
      '<button class="qa-btn" onclick="sendMessage(\'Seance pressing collectif 1h\')">🛡️ Pressing</button>' +
      '<button class="qa-btn" onclick="sendMessage(\'Redige message WhatsApp convocation match samedi 10h\')">📢 Parents</button>';
    bubble.appendChild(actions);
  }

  const avatar = document.createElement("div");
  avatar.className = "avatar";
  avatar.textContent = "⚽";
  wrap.appendChild(avatar);
  wrap.appendChild(bubble);
  messages.appendChild(wrap);
  chat.scrollTop = chat.scrollHeight;
}

function addBotMsgWithSchema(text) {
  const wrap = document.createElement("div");
  wrap.className = "bubble-wrap bot";
  const bubble = document.createElement("div");
  bubble.className = "bubble bot";
  bubble.style.whiteSpace = "pre-wrap";
  bubble.textContent = text;

  // Détecter si la réponse contient des exercices
  const hasExercise = text.toLowerCase().includes("exercice") ||
                      text.toLowerCase().includes("triangle") ||
                      text.toLowerCase().includes("slalom") ||
                      text.toLowerCase().includes("rondo") ||
                      text.toLowerCase().includes("carré") ||
                      text.toLowerCase().includes("échauffement");

  if (hasExercise) {
    const schema = detectSchema(text);
    const schemaDiv = document.createElement("div");
    schemaDiv.className = "schema-container";
    schemaDiv.innerHTML = '<div class="schema-title">📐 Schéma de l\'exercice</div>' + generateSchema(schema.type, schema.players, schema.distance);
    bubble.appendChild(schemaDiv);
  }

  const avatar = document.createElement("div");
  avatar.className = "avatar";
  avatar.textContent = "⚽";
  wrap.appendChild(avatar);
  wrap.appendChild(bubble);
  messages.appendChild(wrap);
  chat.scrollTop = chat.scrollHeight;
}

function addUserMsg(text) {
  const wrap = document.createElement("div");
  wrap.className = "bubble-wrap user";
  const bubble = document.createElement("div");
  bubble.className = "bubble user";
  bubble.textContent = text;
  wrap.appendChild(bubble);
  messages.appendChild(wrap);
  chat.scrollTop = chat.scrollHeight;
}

function setTyping(on) {
  if (on) {
    const wrap = document.createElement("div");
    wrap.className = "bubble-wrap bot";
    wrap.id = "typingIndicator";
    wrap.innerHTML = '<div class="avatar">⚽</div><div class="bubble bot"><div class="typing"><span></span><span></span><span></span></div></div>';
    messages.appendChild(wrap);
    chat.scrollTop = chat.scrollHeight;
  } else {
    const t = document.getElementById("typingIndicator");
    if (t) t.remove();
  }
}

async function sendMessage(text) {
  if (!text || isLoading) return;
  if (!clubKey) { loginScreen.style.display = "flex"; return; }
  addUserMsg(text);
  isLoading = true;
  setTyping(true);
  try {
    const resp = await fetch(COACH_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message: text, userId, categorie, clubKey, deviceId })
    });
    const data = await resp.json();
    setTyping(false);
    if (!resp.ok) {
      addBotMsg("🔒 " + (data.error || "Erreur."));
      if (resp.status === 401 || (data.error && data.error.includes("invalide"))) {
        localStorage.removeItem("coach_club_key");
        clubKey = "";
        setTimeout(() => loginScreen.style.display = "flex", 2000);
      }
    } else {
      addBotMsgWithSchema(data.answer || "Pas de réponse.");
    }
  } catch {
    setTyping(false);
    addBotMsg("Erreur de connexion.");
  }
  isLoading = false;
}

const userInput = document.getElementById("userInput");
document.getElementById("sendBtn").addEventListener("click", () => {
  const text = userInput.value.trim();
  if (!text) return;
  userInput.value = "";
  sendMessage(text);
});
userInput.addEventListener("keydown", e => {
  if (e.key === "Enter") {
    const text = userInput.value.trim();
    if (!text) return;
    userInput.value = "";
    sendMessage(text);
  }
});
</script>
