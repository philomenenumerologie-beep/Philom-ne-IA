<!DOCTYPE html>

<html lang="fr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Coach IA — Assistant Football</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
:root {
  --green-bright: #2ea043;
  --green2: #3fb950;
  --green-glow: rgba(46,160,67,0.3);
  --dim: #a0b0a0;
  --surface2: rgba(0,20,0,0.92);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  color: #fff; font-family: 'DM Sans', sans-serif;
  height: 100vh; display: flex; flex-direction: column;
  overflow: hidden; position: relative;
}
#pitch { position: fixed; inset: 0; z-index: 0; overflow: hidden; }
.pitch-bg {
  width: 100%; height: 100%;
  background: repeating-linear-gradient(180deg, #1a4a1a 0px, #1a4a1a 40px, #1e5c1e 40px, #1e5c1e 80px);
}
.pitch-svg { position: absolute; inset: 0; width: 100%; height: 100%; }
#overlay { position: fixed; inset: 0; z-index: 1; background: rgba(0,10,0,0.45); }

#loginScreen {
position: fixed; inset: 0; z-index: 100;
display: flex; flex-direction: column;
align-items: center; justify-content: center; padding: 24px;
}
.login-card {
background: rgba(255,255,255,0.12);
border: 1px solid rgba(255,255,255,0.3);
border-radius: 20px; padding: 28px 24px;
width: 100%; max-width: 380px;
box-shadow: 0 20px 40px rgba(0,0,0,0.5);
backdrop-filter: blur(20px);
}
.login-logo { text-align: center; margin-bottom: 24px; }
.login-ball { font-size: 48px; display: block; margin-bottom: 8px; }
.login-title {
font-family: ‘Barlow Condensed’, sans-serif;
font-size: 28px; font-weight: 800; color: #fff;
text-transform: uppercase; letter-spacing: 0.05em;
}
.login-sub { font-size: 13px; color: #c8e6c8; margin-top: 4px; }
.login-label { display: block; font-size: 13px; color: #c8e6c8; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.08em; }
.login-input {
width: 100%; background: rgba(255,255,255,0.15);
border: 1px solid rgba(255,255,255,0.3); border-radius: 12px;
padding: 14px 16px; color: #fff; -webkit-text-fill-color: #fff;
font-size: 16px; font-family: ‘DM Sans’, sans-serif;
outline: none; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 16px;
}
.login-input::placeholder { text-transform: none; letter-spacing: 0; color: rgba(255,255,255,0.5); }
.login-btn {
width: 100%; padding: 14px; background: var(–green-bright);
border: none; border-radius: 12px; color: #fff;
font-size: 16px; font-weight: 600; cursor: pointer;
}
.login-error {
margin-top: 12px; padding: 10px 14px;
background: rgba(248,81,73,0.1); border: 1px solid rgba(248,81,73,0.3);
border-radius: 10px; color: #f85149; font-size: 13px; text-align: center; display: none;
}
.login-demo { margin-top: 16px; text-align: center; font-size: 12px; color: #c8e6c8; }
.login-demo span { color: var(–green2); cursor: pointer; text-decoration: underline; }

#topbar {
position: relative; z-index: 10;
display: flex; align-items: center; justify-content: space-between;
padding: 12px 16px;
background: linear-gradient(135deg, rgba(0,40,0,0.98), rgba(0,70,0,0.98));
border-bottom: 2px solid rgba(46,160,67,0.6);
box-shadow: 0 4px 20px rgba(0,0,0,0.6);
}
.logo-area { display: flex; align-items: center; gap: 12px; }
.ball-icon {
width: 40px; height: 40px; border-radius: 50%;
background: rgba(0,0,0,0.4); border: 1.5px solid var(–green-bright);
display: flex; align-items: center; justify-content: center;
font-size: 20px; box-shadow: 0 0 14px var(–green-glow);
}
.logo-text { display: flex; flex-direction: column; }
.logo-name {
font-family: ‘Barlow Condensed’, sans-serif;
font-size: 18px; font-weight: 800; color: #fff;
letter-spacing: 0.08em; text-transform: uppercase;
text-shadow: 0 0 10px rgba(46,160,67,0.8);
}
.logo-sub { font-size: 12px; color: #4ade80; letter-spacing: 0.1em; text-transform: uppercase; font-weight: 600; }
.status { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(–dim); }
.dot-green {
width: 7px; height: 7px; border-radius: 50%;
background: var(–green2); box-shadow: 0 0 6px var(–green2);
animation: pulse 2s infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

#catBar {
position: relative; z-index: 9;
display: flex; gap: 8px; padding: 10px 14px;
background: rgba(5,15,5,0.75);
border-bottom: 1px solid rgba(255,255,255,0.08);
overflow-x: auto; scrollbar-width: none;
}
#catBar::-webkit-scrollbar { display: none; }
.cat-chip {
padding: 6px 14px; border-radius: 20px;
background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);
color: var(–dim); font-family: ‘Barlow Condensed’, sans-serif;
font-size: 14px; font-weight: 600; cursor: pointer; white-space: nowrap;
}
.cat-chip.active { background: var(–green-bright); border-color: var(–green-bright); color: #fff; }

#chat { flex: 1; overflow-y: auto; padding: 16px 14px 120px; position: relative; z-index: 2; }
.bubble-wrap { display: flex; margin-bottom: 14px; animation: fadeUp 0.3s ease; }
@keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
.bubble-wrap.bot { justify-content: flex-start; }
.bubble-wrap.user { justify-content: flex-end; }
.avatar {
width: 30px; height: 30px; border-radius: 50%;
background: rgba(0,0,0,0.5); border: 1px solid var(–green-bright);
display: flex; align-items: center; justify-content: center;
flex-shrink: 0; margin-right: 8px; margin-top: 2px; font-size: 14px;
}
.bubble {
max-width: min(85%, 360px); padding: 11px 14px; border-radius: 16px;
font-size: 14px; line-height: 1.6; white-space: pre-wrap;
}
.bubble.bot {
background: rgba(0,20,0,0.92); border: 1px solid rgba(46,160,67,0.25);
border-top-left-radius: 4px; color: #fff; -webkit-text-fill-color: #fff;
}
.bubble.user {
background: rgba(20,50,20,0.9); border: 1px solid rgba(46,160,67,0.3);
border-top-right-radius: 4px; color: #fff; -webkit-text-fill-color: #fff;
}
.quick-actions { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
.qa-btn {
padding: 8px 14px; background: rgba(255,255,255,0.08);
border: 1px solid rgba(255,255,255,0.15); border-radius: 20px;
color: #fff; font-size: 13px; cursor: pointer;
}

/* SCHEMA PRO */
.schema-wrap {
margin-top: 12px;
border-radius: 12px; overflow: hidden;
border: 1px solid rgba(255,255,255,0.2);
}
.schema-header {
padding: 8px 12px;
background: rgba(0,0,0,0.5);
font-size: 11px; color: #4ade80;
text-transform: uppercase; letter-spacing: 0.1em; font-weight: 600;
}
.schema-desc {
padding: 5px 12px 8px;
background: rgba(0,0,0,0.4);
font-size: 12px; color: #c8e6c8; font-style: italic;
}
.schema-svg-box svg { width: 100%; display: block; }
.schema-legend {
display: flex; gap: 12px; padding: 6px 12px 8px;
background: rgba(0,0,0,0.4);
font-size: 10px; color: rgba(255,255,255,0.6); flex-wrap: wrap;
}
.legend-item { display: flex; align-items: center; gap: 4px; }

.typing { display:flex; gap:4px; padding:12px 14px; }
.typing span {
width:6px; height:6px; border-radius:50%; background:var(–dim);
animation: bounce 1.2s infinite;
}
.typing span:nth-child(2){animation-delay:0.2s}
.typing span:nth-child(3){animation-delay:0.4s}
@keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-6px)}}

#composer {
position: fixed; bottom: 0; left: 0; right: 0; z-index: 10;
padding: 10px 12px 18px;
background: linear-gradient(to top, rgba(5,15,5,0.95) 70%, transparent);
}
.composer-inner {
display: flex; align-items: center; gap: 8px;
background: var(–surface2); border: 1px solid rgba(255,255,255,0.12);
border-radius: 22px; padding: 8px 12px;
}
#userInput {
flex: 1; background: transparent; border: none; outline: none;
color: #fff; -webkit-text-fill-color: #fff;
font-size: 15px; font-family: ‘DM Sans’, sans-serif;
}
#userInput::placeholder { color: var(–dim); -webkit-text-fill-color: var(–dim); }
.send-btn {
width: 38px; height: 38px; border-radius: 50%;
background: var(–green-bright); border: none; color: #fff;
font-size: 16px; display: flex; align-items: center; justify-content: center;
cursor: pointer; flex-shrink: 0;
}
</style>

</head>
<body>

<div id="pitch">
  <div class="pitch-bg"></div>
  <svg class="pitch-svg" viewBox="0 0 400 700" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
    <rect x="20" y="20" width="360" height="660" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="2"/>
    <line x1="20" y1="350" x2="380" y2="350" stroke="rgba(255,255,255,0.25)" stroke-width="2"/>
    <circle cx="200" cy="350" r="60" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="2"/>
    <circle cx="200" cy="350" r="3" fill="rgba(255,255,255,0.3)"/>
    <rect x="90" y="20" width="220" height="80" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
    <rect x="140" y="20" width="120" height="35" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
    <rect x="160" y="12" width="80" height="12" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
    <rect x="90" y="600" width="220" height="80" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
    <rect x="140" y="645" width="120" height="35" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
    <rect x="160" y="676" width="80" height="12" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
  </svg>
</div>
<div id="overlay"></div>

<div id="loginScreen">
  <div class="login-card">
    <div class="login-logo">
      <span class="login-ball">⚽</span>
      <div class="login-title">Coach IA</div>
      <div class="login-sub">Assistant Football — Accès Club</div>
    </div>
    <label class="login-label">Clé d'accès de votre club</label>
    <input class="login-input" id="clubKeyInput" type="text" placeholder="Ex: FC-TOURCOING-X7K2" autocomplete="off"/>
    <button class="login-btn" id="loginBtn">Accéder ⚽</button>
    <div class="login-error" id="loginError"></div>
    <div class="login-demo">Mode démo : <span onclick="useDemoKey()">DEMO-CLUB-0000</span></div>
  </div>
</div>

<header id="topbar">
  <div class="logo-area">
    <div class="ball-icon">⚽</div>
    <div class="logo-text">
      <span class="logo-name">Coach IA</span>
      <span class="logo-sub" id="clubName">Assistant Football</span>
    </div>
  </div>
  <div class="status"><div class="dot-green"></div>En ligne</div>
</header>

<div id="catBar">
  <div class="cat-chip" onclick="selectCat(this,'U6/U7')">U6/U7</div>
  <div class="cat-chip active" onclick="selectCat(this,'U8/U9')">U8/U9</div>
  <div class="cat-chip" onclick="selectCat(this,'U10/U11')">U10/U11</div>
  <div class="cat-chip" onclick="selectCat(this,'U12/U13')">U12/U13</div>
  <div class="cat-chip" onclick="selectCat(this,'U14/U15')">U14/U15</div>
  <div class="cat-chip" onclick="selectCat(this,'U16/U17')">U16/U17</div>
  <div class="cat-chip" onclick="selectCat(this,'U18')">U18</div>
  <div class="cat-chip" onclick="selectCat(this,'Seniors')">Seniors</div>
</div>

<div id="chat"><div id="messages"></div></div>

<div id="composer">
  <div class="composer-inner">
    <input id="userInput" placeholder="Ex: séance dribble, 12 joueurs, 1h…" type="text"/>
    <button class="send-btn" id="sendBtn">➤</button>
  </div>
</div>

<script>
const API_BASE = "https://philo-backend-by2c.onrender.com";
const COACH_URL = API_BASE + "/coach";

let clubKey = localStorage.getItem("coach_club_key") || "";
let deviceId = localStorage.getItem("coach_device_id");
if (!deviceId) {
  deviceId = "device_" + Math.random().toString(36).slice(2, 12);
  localStorage.setItem("coach_device_id", deviceId);
}
let categorie = "U8/U9";
let userId = "coach_" + (localStorage.getItem("coach_user_id") || Math.random().toString(36).slice(2,10));
localStorage.setItem("coach_user_id", userId.replace("coach_",""));
let isLoading = false;

// ===== SCHEMA SVG PRO =====
function buildProSchema(schema) {
  if (!schema) return null;

  const W = 320, H = 220;
  const FIELD_GREEN = "#2d6a2d";
  const FIELD_GREEN2 = "#347a34";
  const LINE_COLOR = "rgba(255,255,255,0.7)";
  const PLAYER_COLOR = "#cc2200";
  const PLAYER_STROKE = "#ffffff";
  const PLOT_COLOR = "#f0a500";
  const BALL_PATH = "#111111";
  const MOVE_PATH = "#cc2200";

  function px(p) { return 10 + p * (W-20) / 100; }
  function py(p) { return 10 + p * (H-20) / 100; }

  let svg = '<svg viewBox="0 0 ' + W + ' ' + H + '" xmlns="http://www.w3.org/2000/svg">';

  // Fond terrain rayé
  svg += '<defs>';
  svg += '<pattern id="grass" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">';
  svg += '<rect width="40" height="40" fill="' + FIELD_GREEN + '"/>';
  svg += '<rect width="40" height="20" fill="' + FIELD_GREEN2 + '"/>';
  svg += '</pattern>';
  // Marqueur flèche noire (ballon)
  svg += '<marker id="mBall" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">';
  svg += '<path d="M0,0 L10,5 L0,10 Z" fill="' + BALL_PATH + '"/>';
  svg += '</marker>';
  // Marqueur flèche rouge (joueur)
  svg += '<marker id="mMove" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">';
  svg += '<path d="M0,0 L10,5 L0,10 Z" fill="' + MOVE_PATH + '"/>';
  svg += '</marker>';
  svg += '</defs>';

  svg += '<rect width="' + W + '" height="' + H + '" fill="url(#grass)"/>';
  svg += '<rect x="5" y="5" width="' + (W-10) + '" height="' + (H-10) + '" fill="none" stroke="' + LINE_COLOR + '" stroke-width="1.5" rx="3"/>';

  // But si présent
  if (schema.goal) {
    const gx = px(schema.goal.x);
    const gy = py(schema.goal.y);
    svg += '<rect x="' + (gx-22) + '" y="' + (gy-6) + '" width="44" height="12" fill="none" stroke="white" stroke-width="2" rx="1"/>';
    svg += '<text x="' + gx + '" y="' + (gy+22) + '" text-anchor="middle" font-size="8" fill="white" font-weight="bold">BUT</text>';
  }

  // Index positions
  const pos = {};
  if (schema.players) schema.players.forEach(p => { pos[p.id] = [px(p.x), py(p.y)]; });
  if (schema.plots) schema.plots.forEach((p,i) => { pos["plot_"+i] = [px(p.x), py(p.y)]; });

  // Trajectoires ballon — pointillés noirs épais
  if (schema.ball_paths) {
    schema.ball_paths.forEach(path => {
      const f = pos[path.from], t = pos[path.to];
      if (!f || !t) return;
      svg += '<line x1="' + f[0] + '" y1="' + f[1] + '" x2="' + t[0] + '" y2="' + t[1] + '"';
      svg += ' stroke="' + BALL_PATH + '" stroke-width="2.5" stroke-dasharray="7,4" marker-end="url(#mBall)"/>';
    });
  }

  // Déplacements joueurs — traits rouges pleins
  if (schema.player_paths) {
    schema.player_paths.forEach(path => {
      const f = pos[path.from], t = pos[path.to];
      if (!f || !t) return;
      svg += '<line x1="' + f[0] + '" y1="' + f[1] + '" x2="' + t[0] + '" y2="' + t[1] + '"';
      svg += ' stroke="' + MOVE_PATH + '" stroke-width="2" marker-end="url(#mMove)"/>';
    });
  }

  // Plots — triangles orange
  if (schema.plots) {
    schema.plots.forEach(p => {
      const x = px(p.x), y = py(p.y);
      svg += '<polygon points="' + x + ',' + (y-7) + ' ' + (x-5) + ',' + (y+4) + ' ' + (x+5) + ',' + (y+4) + '"';
      svg += ' fill="' + PLOT_COLOR + '" stroke="white" stroke-width="0.5"/>';
    });
  }

  // Joueurs — cercles rouges avec lettre
  if (schema.players) {
    schema.players.forEach(p => {
      const x = px(p.x), y = py(p.y);
      svg += '<circle cx="' + x + '" cy="' + y + '" r="10" fill="' + PLAYER_COLOR + '" stroke="' + PLAYER_STROKE + '" stroke-width="1.5"/>';
      svg += '<text x="' + x + '" y="' + (y+4) + '" text-anchor="middle" font-size="9" font-weight="bold" fill="white">' + p.id + '</text>';
    });
  }

  // Distance
  if (schema.distance) {
    svg += '<rect x="5" y="' + (H-18) + '" width="' + (W-10) + '" height="14" fill="rgba(0,0,0,0.5)" rx="2"/>';
    svg += '<text x="' + (W/2) + '" y="' + (H-8) + '" text-anchor="middle" font-size="9" fill="rgba(255,255,255,0.9)">' + schema.distance + '</text>';
  }

  svg += '</svg>';
  return svg;
}

function renderSchema(schema) {
  if (!schema) return "";
  const svgHtml = buildProSchema(schema);
  if (!svgHtml) return "";

  let html = '<div class="schema-wrap">';
  html += '<div class="schema-header">📐 Schéma de l\'exercice</div>';
  if (schema.description) {
    html += '<div class="schema-desc">' + schema.description + '</div>';
  }
  html += '<div class="schema-svg-box">' + svgHtml + '</div>';
  html += '<div class="schema-legend">';
  html += '<div class="legend-item"><svg width="14" height="14"><circle cx="7" cy="7" r="6" fill="#cc2200" stroke="white" stroke-width="1"/></svg> Joueur</div>';
  html += '<div class="legend-item"><svg width="14" height="14"><polygon points="7,1 2,12 12,12" fill="#f0a500" stroke="white" stroke-width="0.5"/></svg> Plot</div>';
  html += '<div class="legend-item"><svg width="22" height="10"><line x1="0" y1="5" x2="18" y2="5" stroke="#111" stroke-width="2.5" stroke-dasharray="5,3"/></svg> Ballon</div>';
  html += '<div class="legend-item"><svg width="22" height="10"><line x1="0" y1="5" x2="18" y2="5" stroke="#cc2200" stroke-width="2"/></svg> Déplacement</div>';
  html += '</div></div>';
  return html;
}

// ===== LOGIN =====
const loginScreen = document.getElementById("loginScreen");
const loginBtn = document.getElementById("loginBtn");
const clubKeyInput = document.getElementById("clubKeyInput");
const loginError = document.getElementById("loginError");

function useDemoKey() { clubKeyInput.value = "DEMO-CLUB-0000"; }

async function tryLogin() {
  const key = clubKeyInput.value.trim().toUpperCase();
  if (!key) { loginError.textContent = "Entrez votre cle."; loginError.style.display = "block"; return; }
  loginBtn.textContent = "Verification...";
  loginBtn.disabled = true;
  loginError.style.display = "none";
  try {
    const resp = await fetch(COACH_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message: "Bonjour", userId, categorie, clubKey: key, deviceId })
    });
    const data = await resp.json();
    if (!resp.ok) {
      loginError.textContent = data.error || "Cle invalide.";
      loginError.style.display = "block";
      loginBtn.textContent = "Acceder";
      loginBtn.disabled = false;
      return;
    }
    clubKey = key;
    localStorage.setItem("coach_club_key", clubKey);
    loginScreen.style.display = "none";
    if (data.club) document.getElementById("clubName").textContent = data.club;
    addBotMsg("Bonjour coach ! Je suis votre assistant " + categorie + ".\n\nDites-moi ce que vous voulez travailler et j'adapte la seance complete avec schemas !", null, true);
  } catch {
    loginError.textContent = "Erreur de connexion.";
    loginError.style.display = "block";
    loginBtn.textContent = "Acceder";
    loginBtn.disabled = false;
  }
}

loginBtn.addEventListener("click", tryLogin);
clubKeyInput.addEventListener("keydown", e => { if (e.key === "Enter") tryLogin(); });
if (clubKey) { clubKeyInput.value = clubKey; tryLogin(); }

function selectCat(el, cat) {
  document.querySelectorAll(".cat-chip").forEach(c => c.classList.remove("active"));
  el.classList.add("active");
  categorie = cat;
  addBotMsg("Categorie : " + cat + " Je m'adapte !", null, false);
}

// ===== CHAT =====
const chat = document.getElementById("chat");
const messages = document.getElementById("messages");

function addBotMsg(text, schema, withActions) {
  const wrap = document.createElement("div");
  wrap.className = "bubble-wrap bot";
  const bubble = document.createElement("div");
  bubble.className = "bubble bot";
  bubble.textContent = text;

  if (schema) {
    bubble.insertAdjacentHTML("beforeend", renderSchema(schema));
  }

  if (withActions) {
    const actions = document.createElement("div");
    actions.className = "quick-actions";
    actions.innerHTML =
      '<button class="qa-btn" onclick="sendMessage(\'Seance dribble 12 joueurs 1h\')">Dribble</button>' +
      '<button class="qa-btn" onclick="sendMessage(\'Seance passe en triangle 10 joueurs 45min\')">Passe</button>' +
      '<button class="qa-btn" onclick="sendMessage(\'Seance tir au but 14 joueurs 1h\')">Tir</button>' +
      '<button class="qa-btn" onclick="sendMessage(\'Seance pressing collectif 1h\')">Pressing</button>' +
      '<button class="qa-btn" onclick="sendMessage(\'Redige message WhatsApp convocation match samedi 10h\')">Parents</button>';
    bubble.appendChild(actions);
  }

  const avatar = document.createElement("div");
  avatar.className = "avatar";
  avatar.textContent = "⚽";
  wrap.appendChild(avatar);
  wrap.appendChild(bubble);
  messages.appendChild(wrap);
  chat.scrollTop = chat.scrollHeight;
}

function addUserMsg(text) {
  const wrap = document.createElement("div");
  wrap.className = "bubble-wrap user";
  const bubble = document.createElement("div");
  bubble.className = "bubble user";
  bubble.textContent = text;
  wrap.appendChild(bubble);
  messages.appendChild(wrap);
  chat.scrollTop = chat.scrollHeight;
}

function setTyping(on) {
  if (on) {
    const wrap = document.createElement("div");
    wrap.className = "bubble-wrap bot";
    wrap.id = "typingIndicator";
    wrap.innerHTML = '<div class="avatar">⚽</div><div class="bubble bot"><div class="typing"><span></span><span></span><span></span></div></div>';
    messages.appendChild(wrap);
    chat.scrollTop = chat.scrollHeight;
  } else {
    const t = document.getElementById("typingIndicator");
    if (t) t.remove();
  }
}

async function sendMessage(text) {
  if (!text || isLoading) return;
  if (!clubKey) { loginScreen.style.display = "flex"; return; }
  addUserMsg(text);
  isLoading = true;
  setTyping(true);
  try {
    const resp = await fetch(COACH_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message: text, userId, categorie, clubKey, deviceId })
    });
    const data = await resp.json();
    setTyping(false);
    if (!resp.ok) {
      addBotMsg("Erreur : " + (data.error || "Probleme de connexion."), null, false);
      if (resp.status === 401) {
        localStorage.removeItem("coach_club_key");
        clubKey = "";
        setTimeout(() => loginScreen.style.display = "flex", 2000);
      }
    } else {
      addBotMsg(data.answer || "Pas de reponse.", data.schema || null, false);
    }
  } catch {
    setTyping(false);
    addBotMsg("Erreur de connexion.", null, false);
  }
  isLoading = false;
}

const userInput = document.getElementById("userInput");
document.getElementById("sendBtn").addEventListener("click", () => {
  const text = userInput.value.trim();
  if (!text) return;
  userInput.value = "";
  sendMessage(text);
});
userInput.addEventListener("keydown", e => {
  if (e.key === "Enter") {
    const text = userInput.value.trim();
    if (!text) return;
    userInput.value = "";
    sendMessage(text);
  }
});
</script>
