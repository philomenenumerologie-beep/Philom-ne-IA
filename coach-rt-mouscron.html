<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1"/>

<title>Coach IA — Risquons-Tout Mouscron</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root {
  --red: #cc0000;
  --red2: #ff1a1a;
  --red-glow: rgba(204,0,0,0.3);
  --white: #ffffff;
  --bg-dark: #1a0000;
  --surface: rgba(30,0,0,0.92);
  --dim: #ffaaaa;
  --border: rgba(204,0,0,0.3);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { color: #fff; font-family: 'DM Sans', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; position: relative; -webkit-touch-callout: none; }
.bubble { -webkit-user-select: text; user-select: text; }

#pitch { position: fixed; inset: 0; z-index: 0; overflow: hidden; }
.pitch-bg { width: 100%; height: 100%; background: repeating-linear-gradient(180deg, #1a4a1a 0px, #1a4a1a 40px, #1e5c1e 40px, #1e5c1e 80px); }
.pitch-svg { position: absolute; inset: 0; width: 100%; height: 100%; }
#overlay { position: fixed; inset: 0; z-index: 1; background: rgba(0,0,0,0.55); }

/* LOGIN */
#loginScreen { position: fixed; inset: 0; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; background: rgba(0,0,0,0.7); }
.login-card { background: rgba(255,255,255,0.1); border: 1px solid rgba(204,0,0,0.4); border-radius: 20px; padding: 28px 24px; width: 100%; max-width: 380px; box-shadow: 0 20px 40px rgba(0,0,0,0.6); backdrop-filter: blur(20px); }
.login-logo { text-align: center; margin-bottom: 20px; }
.login-title { font-family: 'Barlow Condensed', sans-serif; font-size: 26px; font-weight: 800; color: #fff; text-transform: uppercase; letter-spacing: 0.05em; }
.login-club { font-size: 13px; color: var(--red2); font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; margin-top: 2px; }
.login-label { display: block; font-size: 12px; color: #ffaaaa; margin-bottom: 8px; margin-top: 16px; text-transform: uppercase; letter-spacing: 0.08em; }
.login-input { width: 100%; background: rgba(255,255,255,0.12); border: 1px solid rgba(204,0,0,0.4); border-radius: 12px; padding: 14px 16px; color: #fff; -webkit-text-fill-color: #fff; font-size: 16px; font-family: 'DM Sans', sans-serif; outline: none; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 16px; }
.login-input::placeholder { text-transform: none; letter-spacing: 0; color: rgba(255,255,255,0.4); }
.login-btn { width: 100%; padding: 14px; background: var(--red); border: none; border-radius: 12px; color: #fff; font-size: 16px; font-weight: 700; cursor: pointer; font-family: 'DM Sans', sans-serif; box-shadow: 0 4px 16px var(--red-glow); }
.login-error { margin-top: 12px; padding: 10px 14px; background: rgba(248,81,73,0.1); border: 1px solid rgba(248,81,73,0.3); border-radius: 10px; color: #f85149; font-size: 13px; text-align: center; display: none; }

/* TOPBAR */
#topbar { position: relative; z-index: 10; display: flex; align-items: center; justify-content: space-between; padding: 10px 16px; background: linear-gradient(135deg, rgba(10,0,0,0.98), rgba(40,0,0,0.98)); border-bottom: 3px solid var(--red); box-shadow: 0 4px 20px rgba(0,0,0,0.8); }
.logo-area { display: flex; align-items: center; gap: 12px; }
.logo-text { display: flex; flex-direction: column; }
.logo-name { font-family: 'Barlow Condensed', sans-serif; font-size: 18px; font-weight: 800; color: #fff; letter-spacing: 0.08em; text-transform: uppercase; text-shadow: 0 0 10px rgba(204,0,0,0.8); }
.logo-club { font-size: 11px; color: var(--red2); letter-spacing: 0.1em; text-transform: uppercase; font-weight: 700; }
.status { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #ffaaaa; }
.dot-green { width: 7px; height: 7px; border-radius: 50%; background: #4ade80; box-shadow: 0 0 6px #4ade80; animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

#anniversary { position: relative; z-index: 9; text-align: center; padding: 4px; background: linear-gradient(90deg, transparent, rgba(204,0,0,0.4), transparent); font-family: 'Barlow Condensed', sans-serif; font-size: 11px; color: rgba(255,200,200,0.8); letter-spacing: 0.2em; text-transform: uppercase; }

/* MODE TABS */
#modeBar { position: relative; z-index: 9; display: flex; background: rgba(10,0,0,0.9); border-bottom: 1px solid rgba(204,0,0,0.2); }
.mode-tab { flex: 1; padding: 10px; text-align: center; font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 700; color: rgba(255,255,255,0.5); cursor: pointer; letter-spacing: 0.05em; text-transform: uppercase; border-bottom: 3px solid transparent; transition: all 0.2s; -webkit-user-select: none; user-select: none; }
.mode-tab.active { color: #fff; border-bottom-color: var(--red); }

/* CHAT */
#sectionCoach { display: flex; flex-direction: column; flex: 1; overflow: hidden; }
#sectionAdmin { display: none; flex-direction: column; flex: 1; overflow: hidden; }
#chat, #chatAdmin { flex: 1; overflow-y: auto; padding: 16px 14px 100px; position: relative; z-index: 2; }

.bubble-wrap { display: flex; margin-bottom: 14px; animation: fadeUp 0.3s ease; }
@keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
.bubble-wrap.bot { justify-content: flex-start; }
.bubble-wrap.user { justify-content: flex-end; }
.avatar { width: 32px; height: 32px; border-radius: 50%; background: rgba(0,0,0,0.7); border: 1.5px solid var(--red); display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-right: 8px; margin-top: 2px; overflow: hidden; }
.bubble { max-width: min(85%, 360px); padding: 11px 14px; border-radius: 16px; font-size: 14px; line-height: 1.6; }
.bubble.bot { background: rgba(20,0,0,0.92); border: 1px solid rgba(204,0,0,0.2); border-top-left-radius: 4px; color: #fff; -webkit-text-fill-color: #fff; }
.bubble.user { background: rgba(100,0,0,0.8); border: 1px solid rgba(204,0,0,0.4); border-top-right-radius: 4px; color: #fff; -webkit-text-fill-color: #fff; }

.ex-card { background: rgba(40,0,0,0.6); border: 1px solid rgba(204,0,0,0.3); border-radius: 12px; margin-top: 10px; overflow: hidden; }
.ex-card-header { display: flex; align-items: center; justify-content: space-between; padding: 9px 14px; background: rgba(204,0,0,0.15); border-bottom: 1px solid rgba(204,0,0,0.2); }
.ex-card-title { font-family: 'Barlow Condensed', sans-serif; font-size: 14px; font-weight: 700; color: #ff6666; letter-spacing: 0.05em; text-transform: uppercase; }
.ex-card-dur { font-size: 11px; color: #ffaaaa; background: rgba(255,255,255,0.06); padding: 2px 8px; border-radius: 10px; white-space: nowrap; }
.ex-card-body { padding: 10px 14px; }
.ex-line { font-size: 13px; color: #ffdddd; line-height: 1.7; padding: 2px 0; }
.rt-text-block { font-size: 14px; color: #ffdddd; line-height: 1.7; white-space: pre-wrap; }
.rt-text-block strong { color: #fff; font-weight: 600; }

.speak-btn { display: inline-flex; align-items: center; gap: 5px; margin-top: 8px; padding: 5px 12px; background: rgba(204,0,0,0.15); border: 1px solid rgba(204,0,0,0.35); border-radius: 20px; color: #ff9999; font-size: 12px; cursor: pointer; font-family: 'DM Sans', sans-serif; -webkit-user-select: none; user-select: none; }
.speak-btn.speaking { background: rgba(204,0,0,0.3); border-color: var(--red); }

.schema-wrap { margin-top: 12px; border-radius: 12px; overflow: hidden; border: 1px solid rgba(204,0,0,0.3); }
.schema-header { padding: 8px 12px; background: rgba(204,0,0,0.2); font-size: 11px; color: #ff6666; text-transform: uppercase; letter-spacing: 0.1em; font-weight: 600; }
.schema-desc { padding: 5px 12px 8px; background: rgba(0,0,0,0.4); font-size: 12px; color: #ffaaaa; font-style: italic; }
.schema-svg-box svg { width: 100%; display: block; }
.schema-legend { display: flex; gap: 12px; padding: 6px 12px 8px; background: rgba(0,0,0,0.4); font-size: 10px; color: rgba(255,255,255,0.6); flex-wrap: wrap; }
.legend-item { display: flex; align-items: center; gap: 4px; }

.prepa-table-wrap { margin-top: 8px; overflow-x: auto; border-radius: 8px; border: 1px solid rgba(204,0,0,0.25); }
.prepa-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.prepa-table th { background: rgba(204,0,0,0.3); color: #fff; padding: 6px 8px; text-align: left; font-size: 11px; font-weight: 700; text-transform: uppercase; }
.prepa-table td { padding: 6px 8px; color: #ffdddd; border-bottom: 1px solid rgba(204,0,0,0.1); }
.prepa-table tr:nth-child(even) td { background: rgba(204,0,0,0.06); }

.typing { display:flex; gap:4px; padding:12px 14px; }
.typing span { width:6px; height:6px; border-radius:50%; background:var(--dim); animation: bounce 1.2s infinite; }
.typing span:nth-child(2){animation-delay:0.2s} .typing span:nth-child(3){animation-delay:0.4s}
@keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-6px)}}

/* PDF DOWNLOAD BTN */
.pdf-btn { display: inline-flex; align-items: center; gap: 8px; margin-top: 12px; padding: 10px 18px; background: var(--red); border: none; border-radius: 12px; color: #fff; font-size: 14px; font-weight: 600; cursor: pointer; font-family: 'DM Sans', sans-serif; box-shadow: 0 4px 12px var(--red-glow); -webkit-user-select: none; user-select: none; }

/* COMPOSER */
#composer { position: fixed; bottom: 0; left: 0; right: 0; z-index: 10; padding: 10px 12px 18px; background: linear-gradient(to top, rgba(10,0,0,0.97) 70%, transparent); }
.composer-inner { display: flex; align-items: center; gap: 8px; background: rgba(30,0,0,0.95); border: 1px solid rgba(204,0,0,0.3); border-radius: 22px; padding: 8px 12px; }
.composer-input { flex: 1; background: transparent; border: none; outline: none; color: #fff; -webkit-text-fill-color: #fff; font-size: 15px; font-family: 'DM Sans', sans-serif; }
.composer-input::placeholder { color: #ffaaaa; -webkit-text-fill-color: #ffaaaa; }
.send-btn { width: 38px; height: 38px; border-radius: 50%; background: var(--red); border: none; color: #fff; font-size: 16px; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; box-shadow: 0 4px 12px var(--red-glow); -webkit-user-select: none; user-select: none; }
</style>
</head>

<script>
var API_BASE = "https://philo-backend-by2c.onrender.com";
var COACH_URL = API_BASE + "/coach";

var clubKey = localStorage.getItem("rt_club_key") || "";
var deviceId = localStorage.getItem("rt_device_id");
if (!deviceId) { deviceId = "device_" + Math.random().toString(36).slice(2,12); localStorage.setItem("rt_device_id", deviceId); }
var userId = "rt_" + (localStorage.getItem("rt_user_id") || Math.random().toString(36).slice(2,10));
localStorage.setItem("rt_user_id", userId.replace("rt_",""));
var isLoading = false;
var currentMode = "coach";
var currentUtterance = null;

if (window.speechSynthesis) {
  window.speechSynthesis.getVoices();
  window.speechSynthesis.onvoiceschanged = function() { window.speechSynthesis.getVoices(); };
}

var avatarSVG = '<svg width="28" height="28" viewBox="0 0 100 100"><circle cx="50" cy="50" r="48" fill="#111" stroke="#cc0000" stroke-width="3"/><text x="50" y="58" text-anchor="middle" font-family="Arial Black" font-size="28" font-weight="900" fill="white">RT</text></svg>';

// ===== TTS =====
function speakEl(btn) {
  var bubble = btn.closest('.bubble') || btn.closest('.ex-card');
  if (!bubble) return;
  var text = (bubble.textContent || bubble.innerText || '').replace(/Écouter/g,'').replace(/Stop/g,'').replace(/\s+/g,' ').trim();
  if (!window.speechSynthesis) return;
  if (window.speechSynthesis.speaking) {
    window.speechSynthesis.cancel();
    document.querySelectorAll('.speak-btn').forEach(function(b) { b.classList.remove('speaking'); b.textContent = 'Écouter'; });
    currentUtterance = null; return;
  }
  var utt = new SpeechSynthesisUtterance(text);
  utt.lang = 'fr-FR'; utt.rate = 0.95;
  var voices = window.speechSynthesis.getVoices();
  var frVoice = voices.find(function(v) { return v.lang && v.lang.startsWith('fr'); });
  if (frVoice) utt.voice = frVoice;
  currentUtterance = utt;
  btn.classList.add('speaking'); btn.textContent = 'Stop';
  utt.onend = function() { btn.classList.remove('speaking'); btn.textContent = 'Écouter'; currentUtterance = null; };
  utt.onerror = function() { btn.classList.remove('speaking'); btn.textContent = 'Écouter'; currentUtterance = null; };
  window.speechSynthesis.speak(utt);
}

// ===== MARKDOWN =====
function parseMarkdown(text) {
  var lines = text.split('\n');
  var html = '';
  var currentCard = null;
  var tableLines = [];
  var inTable = false;

  function flushCard() {
    if (!currentCard) return;
    var t = currentCard.title.toLowerCase();
    var emoji = t.indexOf('echauffement') >= 0 || t.indexOf('chauffement') >= 0 ? '🔥 '
      : t.indexOf('exercice 1') >= 0 ? '⚡ '
      : t.indexOf('exercice 2') >= 0 ? '💥 '
      : t.indexOf('exercice 3') >= 0 ? '🎯 '
      : t.indexOf('match') >= 0 || t.indexOf('jeu') >= 0 ? '🏆 '
      : t.indexOf('conclusion') >= 0 || t.indexOf('retour') >= 0 ? '✅ '
      : t.indexOf('bip') >= 0 ? '🏃 '
      : t.indexOf('cooper') >= 0 ? '⏱ '
      : t.indexOf('sprint') >= 0 ? '⚡ ' : '';
    html += '<div class="ex-card"><div class="ex-card-header"><span class="ex-card-title">' + emoji + currentCard.title + '</span>';
    if (currentCard.dur) html += '<span class="ex-card-dur">' + currentCard.dur + '</span>';
    html += '</div><div class="ex-card-body">' + currentCard.body;
    html += '<button class="speak-btn" onclick="speakEl(this)">Écouter</button></div></div>';
    currentCard = null;
  }

  function flushTable() {
    var dataLines = tableLines.filter(function(l) { return !l.match(/^[\s|\-]+$/); });
    if (dataLines.length >= 2) {
      var tHtml = '<div class="prepa-table-wrap"><table class="prepa-table">';
      dataLines.forEach(function(l, i) {
        var cells = l.split('|').map(function(c) { return c.trim(); }).filter(function(c) { return c !== ''; });
        if (!cells.length) return;
        if (i === 0) { tHtml += '<thead><tr>'; cells.forEach(function(c) { tHtml += '<th>' + c + '</th>'; }); tHtml += '</tr></thead><tbody>'; }
        else { tHtml += '<tr>'; cells.forEach(function(c) { tHtml += '<td>' + c + '</td>'; }); tHtml += '</tr>'; }
      });
      tHtml += '</tbody></table></div>';
      if (currentCard) currentCard.body += tHtml; else html += tHtml;
    }
    tableLines = []; inTable = false;
  }

  function addLine(line) {
    var clean = line.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>').replace(/^\s*[-]\s*/, '').trim();
    if (!clean) return;
    var lineHtml = '<div class="ex-line">' + clean + '</div>';
    if (currentCard) currentCard.body += lineHtml; else html += lineHtml;
  }

  lines.forEach(function(line) {
    if (line.trim().charAt(0) === '|') {
      if (!inTable) { inTable = true; tableLines = []; }
      tableLines.push(line.trim()); return;
    } else if (inTable) { flushTable(); }

    var h = line.match(/^#{1,3}\s+(.+)$/);
    if (h) { flushCard(); currentCard = { title: h[1].trim(), dur: '', body: '' }; return; }

    var boldTitle = line.match(/^\*\*([^*]+?)\*\*\s*(\((\d+\s*(?:minutes?|min|heures?|h))\))?\s*$/i);
    if (boldTitle) { flushCard(); currentCard = { title: boldTitle[1].trim(), dur: boldTitle[3]||'', body: '' }; return; }

    var tl = line.trim();
    var keywords = ['exercice', 'echauffement', 'chauffement', 'match final', 'jeu final', 'conclusion', 'retour au calme'];
    var isCardTitle = keywords.some(function(k) { return tl.toLowerCase().indexOf(k) === 0; });
    if (isCardTitle && tl.length < 90) {
      var durMatch = tl.match(/(\(\d+\s*(?:minutes?|min|heures?|h)\))/i);
      var dur2 = durMatch ? durMatch[1].replace(/[()]/g,'').trim() : '';
      var title2 = tl.replace(/\s*\(\d+\s*(?:minutes?|min|heures?|h)\)/i, '').replace(/[:.]+$/, '').trim();
      flushCard(); currentCard = { title: title2, dur: dur2, body: '' }; return;
    }
    if (!tl) return;
    addLine(line);
  });

  if (inTable) flushTable();
  flushCard();

  if (!html) {
    var safe = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>').replace(/\n/g, '<br/>');
    return '<div class="rt-text-block">' + safe + '</div>';
  }
  return html;
}

// ===== SCHEMA =====
function buildProSchema(schema) {
  if (!schema) return null;
  var W = 320, H = 220;
  var px = function(p) { return 10 + p * (W-20) / 100; };
  var py = function(p) { return 10 + p * (H-20) / 100; };
  var PC = "#cc0000", PLOT = "#ffffff", BALL = "#ffffff", MOVE = "#ff6666";
  var defs = '<defs><marker id="aB" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="'+BALL+'" opacity="0.9"/></marker><marker id="aM" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="'+MOVE+'"/></marker></defs>';
  var els = [];
  els.push('<defs><pattern id="gRT" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse"><rect width="40" height="40" fill="#1a4a1a"/><rect width="40" height="20" fill="#1e5c1e"/></pattern></defs>');
  els.push('<rect width="'+W+'" height="'+H+'" fill="url(#gRT)" rx="8"/>');
  els.push('<rect x="5" y="5" width="'+(W-10)+'" height="'+(H-10)+'" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1.5" rx="3"/>');
  var pos = {};
  if (schema.players) schema.players.forEach(function(p) { pos[p.id] = [px(p.x), py(p.y)]; });
  if (schema.plots) schema.plots.forEach(function(p,i) { pos["plot_"+i] = [px(p.x), py(p.y)]; });
  if (schema.goal) { var gx=px(schema.goal.x),gy=py(schema.goal.y); els.push('<rect x="'+(gx-22)+'" y="'+(gy-6)+'" width="44" height="12" fill="none" stroke="white" stroke-width="2" rx="1"/>'); els.push('<text x="'+gx+'" y="'+(gy+22)+'" text-anchor="middle" font-size="8" fill="white" font-weight="bold">BUT</text>'); }
  if (schema.ball_paths) schema.ball_paths.forEach(function(p) { var f=pos[p.from],t=pos[p.to]; if(!f||!t)return; els.push('<line x1="'+f[0]+'" y1="'+f[1]+'" x2="'+t[0]+'" y2="'+t[1]+'" stroke="'+BALL+'" stroke-width="2.5" stroke-dasharray="7,4" marker-end="url(#aB)"/>'); });
  if (schema.player_paths) schema.player_paths.forEach(function(p) { var f=pos[p.from],t=pos[p.to]; if(!f||!t)return; els.push('<line x1="'+f[0]+'" y1="'+f[1]+'" x2="'+t[0]+'" y2="'+t[1]+'" stroke="'+MOVE+'" stroke-width="2" marker-end="url(#aM)"/>'); });
  if (schema.plots) schema.plots.forEach(function(p) { var x=px(p.x),y=py(p.y); els.push('<polygon points="'+x+','+(y-7)+' '+(x-5)+','+(y+4)+' '+(x+5)+','+(y+4)+'" fill="'+PLOT+'" stroke="rgba(0,0,0,0.3)" stroke-width="0.5"/>'); });
  if (schema.players) schema.players.forEach(function(p) { var x=px(p.x),y=py(p.y); els.push('<circle cx="'+x+'" cy="'+y+'" r="10" fill="'+PC+'" stroke="white" stroke-width="1.5"/>'); els.push('<text x="'+x+'" y="'+(y+4)+'" text-anchor="middle" font-size="8" font-weight="bold" fill="white">'+p.id+'</text>'); });
  if (schema.distance) { els.push('<rect x="5" y="'+(H-18)+'" width="'+(W-10)+'" height="14" fill="rgba(0,0,0,0.6)" rx="2"/>'); els.push('<text x="'+(W/2)+'" y="'+(H-8)+'" text-anchor="middle" font-size="9" fill="rgba(255,255,255,0.9)">'+schema.distance+'</text>'); }
  return '<svg viewBox="0 0 '+W+' '+H+'" xmlns="http://www.w3.org/2000/svg">'+defs+els.join("")+'</svg>';
}

function renderSchema(schema) {
  if (!schema) return "";
  var s = buildProSchema(schema);
  if (!s) return "";
  return '<div class="schema-wrap"><div class="schema-header">Schéma de l\'exercice</div>'+(schema.description?'<div class="schema-desc">'+schema.description+'</div>':'')+'<div class="schema-svg-box">'+s+'</div><div class="schema-legend"><div class="legend-item"><svg width="14" height="14"><circle cx="7" cy="7" r="6" fill="#cc0000" stroke="white" stroke-width="1"/></svg> Joueur</div><div class="legend-item"><svg width="14" height="14"><polygon points="7,1 2,12 12,12" fill="white"/></svg> Plot</div><div class="legend-item"><svg width="22" height="10"><line x1="0" y1="5" x2="18" y2="5" stroke="white" stroke-width="2.5" stroke-dasharray="5,3"/></svg> Ballon</div><div class="legend-item"><svg width="22" height="10"><line x1="0" y1="5" x2="18" y2="5" stroke="#ff6666" stroke-width="2"/></svg> Déplacement</div></div></div>';
}

// ===== PDF GENERATION =====
function generatePDF(title, content) {
  // Simple PDF via printable window
  var win = window.open('', '_blank');
  if (!win) { alert("Autorisez les popups pour télécharger le PDF."); return; }
  win.document.write('<!DOCTYPE html><html><head><meta charset="utf-8"/><title>' + title + '</title><style>body{font-family:Arial,sans-serif;padding:30px;color:#111;max-width:800px;margin:0 auto}h1{color:#cc0000;font-size:22px;border-bottom:3px solid #cc0000;padding-bottom:8px;margin-bottom:20px}h2{color:#cc0000;font-size:16px;margin-top:20px;margin-bottom:8px}table{width:100%;border-collapse:collapse;margin:10px 0}th{background:#cc0000;color:white;padding:8px;text-align:left;font-size:13px}td{padding:8px;border-bottom:1px solid #eee;font-size:13px}tr:nth-child(even) td{background:#fff5f5}.footer{margin-top:30px;font-size:11px;color:#999;text-align:center}p{line-height:1.6;margin:6px 0}@media print{button{display:none}}</style></head><body>');
  win.document.write('<h1>' + title + '</h1>');
  win.document.write(content);
  win.document.write('<div class="footer">Risquons-Tout Mouscron — Coach IA — ' + new Date().toLocaleDateString('fr-FR') + '</div>');
  win.document.write('<br/><button onclick="window.print()" style="background:#cc0000;color:white;border:none;padding:10px 20px;border-radius:8px;font-size:14px;cursor:pointer;margin-right:10px">Imprimer / Sauvegarder PDF</button><button onclick="window.close()" style="background:#666;color:white;border:none;padding:10px 20px;border-radius:8px;font-size:14px;cursor:pointer">Fermer</button>');
  win.document.write('</body></html>');
  win.document.close();
}

// ===== DETECT ADMIN INTENT =====
function detectAdminIntent(text) {
  var t = text.toLowerCase().trim();
  if (t.indexOf('message parent') === 0 || t.indexOf('message aux parent') === 0 || t.indexOf('convocation') === 0 || t.indexOf('deplacement') === 0 || t.indexOf('annulation') === 0 || t.indexOf('info parent') === 0) return 'message';
  if (t.indexOf('test physique') === 0 || t.indexOf('test du bip') === 0 || t.indexOf('bip test') === 0 || t.indexOf('bip') === 0 || t.indexOf('cooper') === 0 || t.indexOf('sprint') === 0 || t.indexOf('test') === 0) return 'test';
  if (t.indexOf('presence') === 0 || t.indexOf('présence') === 0 || t.indexOf('feuille de presence') === 0) return 'presence';
  return 'general';
}

// ===== SWITCH MODE =====
function switchMode(mode, el) {
  currentMode = mode;
  document.querySelectorAll(".mode-tab").forEach(function(t) { t.classList.remove("active"); });
  el.classList.add("active");
  if (mode === "coach") {
    document.getElementById("sectionCoach").style.display = "flex";
    document.getElementById("sectionAdmin").style.display = "none";
    document.getElementById("userInput").placeholder = "Ex: U13, 12 joueurs, finition, 1h...";
  } else {
    document.getElementById("sectionCoach").style.display = "none";
    document.getElementById("sectionAdmin").style.display = "flex";
    document.getElementById("userInput").placeholder = "Ex: Message parents, Test bip, Présence...";
    if (document.getElementById("messagesAdmin").children.length === 0) showAdminWelcome();
  }
}

// ===== LOGIN =====
var loginScreen = document.getElementById("loginScreen");
var loginBtn = document.getElementById("loginBtn");
var clubKeyInput = document.getElementById("clubKeyInput");
var loginError = document.getElementById("loginError");

async function tryLogin() {
  var key = clubKeyInput.value.trim().toUpperCase();
  if (!key) { loginError.textContent = "Entrez votre clé."; loginError.style.display = "block"; return; }
  loginBtn.textContent = "Vérification..."; loginBtn.disabled = true; loginError.style.display = "none";
  try {
    var resp = await fetch(COACH_URL, { method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify({message:"Bonjour", userId:userId, categorie:"", clubKey:key, deviceId:deviceId}) });
    var data = await resp.json();
    if (!resp.ok) { loginError.textContent = data.error||"Clé invalide."; loginError.style.display="block"; loginBtn.textContent="Accéder"; loginBtn.disabled=false; return; }
    clubKey = key; localStorage.setItem("rt_club_key", clubKey);
    loginScreen.style.display = "none";
    addBotMsg("Bonjour Coach ! 👋\n\nJe suis Coach IA, votre assistant Risquons-Tout Mouscron.\n\nDites-moi simplement ce que vous voulez — catégorie, nombre de joueurs, thème, durée — et je m'occupe du reste.");
  } catch(e) { loginError.textContent="Erreur de connexion."; loginError.style.display="block"; loginBtn.textContent="Accéder"; loginBtn.disabled=false; }
}
loginBtn.addEventListener("click", tryLogin);
clubKeyInput.addEventListener("keydown", function(e) { if (e.key==="Enter") tryLogin(); });
if (clubKey) { clubKeyInput.value = clubKey; tryLogin(); }

// ===== CHAT COACH =====
var chat = document.getElementById("chat");
var messages = document.getElementById("messages");

function addBotMsg(text, schema) {
  var wrap = document.createElement("div"); wrap.className = "bubble-wrap bot";
  var bubble = document.createElement("div"); bubble.className = "bubble bot";
  bubble.innerHTML = parseMarkdown(text);
  if (schema) bubble.insertAdjacentHTML("beforeend", renderSchema(schema));
  var hasCards = bubble.querySelector('.ex-card');
  if (!hasCards) {
    var sb = document.createElement("button"); sb.className = "speak-btn"; sb.textContent = "Écouter";
    sb.onclick = function() { speakEl(this); };
    bubble.appendChild(sb);
  }
  var avatar = document.createElement("div"); avatar.className = "avatar"; avatar.innerHTML = avatarSVG;
  wrap.appendChild(avatar); wrap.appendChild(bubble);
  messages.appendChild(wrap);
  setTimeout(function() { wrap.scrollIntoView({ behavior:'smooth', block:'start' }); }, 100);
}

function addUserMsg(text) {
  var wrap = document.createElement("div"); wrap.className = "bubble-wrap user";
  var bubble = document.createElement("div"); bubble.className = "bubble user"; bubble.textContent = text;
  wrap.appendChild(bubble); messages.appendChild(wrap); chat.scrollTop = chat.scrollHeight;
}

// ===== CHAT ADMIN =====
var chatAdmin = document.getElementById("chatAdmin");
var messagesAdmin = document.getElementById("messagesAdmin");

function addBotMsgAdmin(text, pdfTitle, pdfContent) {
  var wrap = document.createElement("div"); wrap.className = "bubble-wrap bot";
  var bubble = document.createElement("div"); bubble.className = "bubble bot";
  bubble.innerHTML = parseMarkdown(text);
  if (pdfTitle && pdfContent) {
    var btn = document.createElement("button"); btn.className = "pdf-btn";
    btn.innerHTML = "📄 Télécharger le PDF";
    btn.onclick = (function(t, c) { return function() { generatePDF(t, c); }; })(pdfTitle, pdfContent);
    bubble.appendChild(btn);
  }
  var sb = document.createElement("button"); sb.className = "speak-btn"; sb.textContent = "Écouter";
  sb.onclick = function() { speakEl(this); };
  bubble.appendChild(sb);
  var avatar = document.createElement("div"); avatar.className = "avatar"; avatar.innerHTML = avatarSVG;
  wrap.appendChild(avatar); wrap.appendChild(bubble);
  messagesAdmin.appendChild(wrap);
  setTimeout(function() { wrap.scrollIntoView({ behavior:'smooth', block:'start' }); }, 100);
}

function addUserMsgAdmin(text) {
  var wrap = document.createElement("div"); wrap.className = "bubble-wrap user";
  var bubble = document.createElement("div"); bubble.className = "bubble user"; bubble.textContent = text;
  wrap.appendChild(bubble); messagesAdmin.appendChild(wrap); chatAdmin.scrollTop = chatAdmin.scrollHeight;
}

function showAdminWelcome() {
  addBotMsgAdmin("Bonjour Coach ! 👋\n\nDites-moi ce que vous voulez faire :\n\n— **Message parents** : convocation, déplacement, annulation, info...\n— **Test physique** : bip test, mini cooper, sprint 30m...\n— **Présence** : liste des présents et absents\n\nTapez simplement votre demande, je m'occupe du reste.", null, null);
}

// ===== TYPING =====
function setTyping(on) {
  var container = currentMode === "coach" ? messages : messagesAdmin;
  var scrollEl = currentMode === "coach" ? chat : chatAdmin;
  if (on) {
    var wrap = document.createElement("div"); wrap.className = "bubble-wrap bot"; wrap.id = "typingIndicator";
    wrap.innerHTML = '<div class="avatar">'+avatarSVG+'</div><div class="bubble bot"><div class="typing"><span></span><span></span><span></span></div></div>';
    container.appendChild(wrap); scrollEl.scrollTop = scrollEl.scrollHeight;
  } else { var t = document.getElementById("typingIndicator"); if(t) t.remove(); }
}

// ===== SEND COACH =====
async function sendMessage(text) {
  if (!text || isLoading) return;
  if (!clubKey) { loginScreen.style.display = "flex"; return; }
  addUserMsg(text); isLoading = true; setTyping(true);
  try {
    var resp = await fetch(COACH_URL, { method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify({message:text, userId:userId, categorie:"", clubKey:clubKey, deviceId:deviceId}) });
    var data = await resp.json();
    setTyping(false);
    if (!resp.ok) addBotMsg("Erreur : " + (data.error||"Connexion impossible."));
    else addBotMsg(data.answer||"Pas de réponse.", data.schema||null);
  } catch(e) { setTyping(false); addBotMsg("Erreur de connexion. Réessayez."); }
  isLoading = false;
}

// ===== SEND ADMIN =====
async function sendMessageAdmin(text) {
  if (!text || isLoading) return;
  if (!clubKey) { loginScreen.style.display = "flex"; return; }
  var intent = detectAdminIntent(text);
  addUserMsgAdmin(text); isLoading = true; setTyping(true);

  var prompts = {
    'message': "Tu es l'assistant Coach IA de Risquons-Tout Mouscron. Le coach te donne des infos pour un message aux parents. Rédige un message WhatsApp clair, court et professionnel avec des emojis adaptés. Génère aussi une version HTML propre pour un PDF (utilise des balises <p>, <strong>, <br/>). Commence par le message WhatsApp, puis une ligne séparatrice, puis la version PDF. Voici les infos : " + text,
    'test': "Tu es l'assistant Coach IA de Risquons-Tout Mouscron. Le coach te donne des résultats de tests physiques. Analyse-les et présente un tableau HTML avec colonnes : Joueur, Résultat, Niveau (Excellent/Bon/Moyen/Faible), Recommandations. Format : réponds d'abord avec un résumé court en texte, puis le tableau HTML complet. Résultats : " + text,
    'presence': "Tu es l'assistant Coach IA de Risquons-Tout Mouscron. Le coach te donne une liste de présences. Formate-la proprement : présents, absents, retards, avec totaux. Génère un résumé texte court et un tableau HTML pour PDF. Données : " + text,
    'general': "Tu es l'assistant Coach IA de Risquons-Tout Mouscron, section admin. Réponds de façon utile et concise à cette demande : " + text
  };

  try {
    var resp = await fetch(COACH_URL, { method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify({message:prompts[intent], userId:userId+"_admin", categorie:"", clubKey:clubKey, deviceId:deviceId}) });
    var data = await resp.json();
    setTyping(false);
    if (!resp.ok) { addBotMsgAdmin("Erreur : " + (data.error||"Connexion impossible."), null, null); }
    else {
      var answer = data.answer || "Pas de réponse.";
      // Build PDF content from answer — extract HTML tables/paragraphs if present
      var pdfContent = answer.replace(/\n/g, '<br/>');
      var pdfTitles = { 'message': 'Message Parents — RT Mouscron', 'test': 'Résultats Tests Physiques — RT Mouscron', 'presence': 'Feuille de Présence — RT Mouscron', 'general': 'Document — RT Mouscron' };
      // Show message bubble with PDF button for message/test/presence
      if (intent !== 'general') addBotMsgAdmin(answer, pdfTitles[intent], pdfContent);
      else addBotMsgAdmin(answer, null, null);
    }
  } catch(e) { setTyping(false); addBotMsgAdmin("Erreur de connexion. Réessayez.", null, null); }
  isLoading = false;
}

// ===== INPUT =====
var userInput = document.getElementById("userInput");
document.getElementById("sendBtn").addEventListener("click", function() {
  var text = userInput.value.trim(); if (!text) return;
  userInput.value = "";
  if (currentMode === "coach") sendMessage(text); else sendMessageAdmin(text);
});
userInput.addEventListener("keydown", function(e) {
  if (e.key === "Enter") {
    var text = userInput.value.trim(); if (!text) return;
    userInput.value = "";
    if (currentMode === "coach") sendMessage(text); else sendMessageAdmin(text);
  }
});
</script>
