<!DOCTYPE html>

<html lang="fr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Coach IA — Assistant Football</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #0d1117;
  --surface: #161b22;
  --surface2: #1c2128;
  --border: rgba(255,255,255,0.08);
  --text: #e6edf3;
  --dim: #7d8590;
  --green: #2ea043;
  --green2: #3fb950;
  --green-glow: rgba(46,160,67,0.3);
  --user-bg: #1f2d1f;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: radial-gradient(ellipse 60% 40% at 50% 0%, rgba(46,160,67,0.06) 0%, transparent 60%);
  pointer-events: none;
}

/* ÉCRAN DE CONNEXION */
#loginScreen {
position: fixed;
inset: 0;
background: var(–bg);
z-index: 100;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
padding: 24px;
}
.login-card {
background: var(–surface);
border: 1px solid var(–border);
border-radius: 20px;
padding: 28px 24px;
width: 100%;
max-width: 380px;
box-shadow: 0 20px 40px rgba(0,0,0,0.5);
}
.login-logo {
text-align: center;
margin-bottom: 24px;
}
.login-ball { font-size: 48px; display: block; margin-bottom: 8px; }
.login-title {
font-family: ‘Barlow Condensed’, sans-serif;
font-size: 28px;
font-weight: 800;
color: var(–text);
text-transform: uppercase;
letter-spacing: 0.05em;
}
.login-sub { font-size: 13px; color: var(–dim); margin-top: 4px; }
.login-label {
display: block;
font-size: 13px;
color: var(–dim);
margin-bottom: 8px;
text-transform: uppercase;
letter-spacing: 0.08em;
}
.login-input {
width: 100%;
background: var(–surface2);
border: 1px solid var(–border);
border-radius: 12px;
padding: 14px 16px;
color: var(–text);
font-size: 16px;
font-family: ‘DM Sans’, sans-serif;
outline: none;
text-transform: uppercase;
letter-spacing: 0.1em;
margin-bottom: 16px;
}
.login-input:focus { border-color: var(–green); }
.login-input::placeholder { text-transform: none; letter-spacing: 0; color: var(–dim); }
.login-btn {
width: 100%;
padding: 14px;
background: var(–green);
border: none;
border-radius: 12px;
color: #fff;
font-size: 16px;
font-weight: 600;
font-family: ‘DM Sans’, sans-serif;
cursor: pointer;
box-shadow: 0 4px 16px var(–green-glow);
}
.login-btn:active { opacity: 0.85; }
.login-error {
margin-top: 12px;
padding: 10px 14px;
background: rgba(248,81,73,0.1);
border: 1px solid rgba(248,81,73,0.3);
border-radius: 10px;
color: #f85149;
font-size: 13px;
text-align: center;
display: none;
}
.login-demo {
margin-top: 16px;
text-align: center;
font-size: 12px;
color: var(–dim);
}
.login-demo span {
color: var(–green2);
cursor: pointer;
text-decoration: underline;
}

/* TOPBAR */
#topbar {
position: relative;
z-index: 10;
display: flex;
align-items: center;
justify-content: space-between;
padding: 12px 16px;
background: rgba(13,17,23,0.95);
backdrop-filter: blur(12px);
border-bottom: 1px solid var(–border);
}
.logo-area { display: flex; align-items: center; gap: 12px; }
.ball-icon {
width: 40px; height: 40px;
border-radius: 50%;
background: linear-gradient(135deg, #1a2a1a, #0d1a0d);
border: 1.5px solid var(–green);
display: flex; align-items: center; justify-content: center;
font-size: 20px;
box-shadow: 0 0 14px var(–green-glow);
}
.logo-text { display: flex; flex-direction: column; }
.logo-name {
font-family: ‘Barlow Condensed’, sans-serif;
font-size: 16px; font-weight: 800;
color: var(–text);
letter-spacing: 0.05em;
text-transform: uppercase;
line-height: 1.1;
}
.logo-sub { font-size: 11px; color: var(–green2); letter-spacing: 0.08em; text-transform: uppercase; }
.status { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(–dim); }
.dot-green {
width: 7px; height: 7px; border-radius: 50%;
background: var(–green2);
box-shadow: 0 0 6px var(–green2);
animation: pulse 2s infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
#clubName { font-size: 11px; color: var(–green2); font-weight: 500; }

/* CATEGORIES */
#catBar {
position: relative; z-index: 9;
display: flex; gap: 8px;
padding: 10px 14px;
background: var(–surface);
border-bottom: 1px solid var(–border);
overflow-x: auto; scrollbar-width: none;
}
#catBar::-webkit-scrollbar { display: none; }
.cat-chip {
padding: 6px 14px; border-radius: 20px;
background: var(–surface2);
border: 1px solid var(–border);
color: var(–dim);
font-family: ‘Barlow Condensed’, sans-serif;
font-size: 14px; font-weight: 600;
letter-spacing: 0.05em;
cursor: pointer; white-space: nowrap;
transition: all 0.2s;
}
.cat-chip:hover { border-color: var(–green); color: var(–green2); }
.cat-chip.active {
background: var(–green); border-color: var(–green);
color: #fff; box-shadow: 0 0 10px var(–green-glow);
}

/* CHAT */
#chat {
flex: 1; overflow-y: auto;
padding: 16px 14px 120px;
position: relative; z-index: 1;
}
#chat::-webkit-scrollbar { width: 3px; }
#chat::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

.bubble-wrap {
display: flex; margin-bottom: 14px;
animation: fadeUp 0.3s ease;
}
@keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
.bubble-wrap.bot { justify-content: flex-start; }
.bubble-wrap.user { justify-content: flex-end; }

.avatar {
width: 30px; height: 30px; border-radius: 50%;
background: linear-gradient(135deg, #1a2a1a, #0d1a0d);
border: 1px solid var(–green);
display: flex; align-items: center; justify-content: center;
flex-shrink: 0; margin-right: 8px; margin-top: 2px; font-size: 14px;
}
.bubble {
max-width: min(78%, 340px);
padding: 11px 14px; border-radius: 16px;
font-size: 14px; line-height: 1.6; white-space: pre-wrap;
}
.bubble.bot {
background: var(–surface2); border: 1px solid var(–border);
border-top-left-radius: 4px;
}
.bubble.user {
background: var(–user-bg); border: 1px solid rgba(46,160,67,0.2);
border-top-right-radius: 4px; color: #c8e6c8;
}

/* Quick actions */
.quick-actions { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
.qa-btn {
padding: 8px 14px; background: var(–surface2);
border: 1px solid var(–border); border-radius: 20px;
color: var(–text); font-size: 13px; cursor: pointer;
font-family: ‘DM Sans’, sans-serif; transition: all 0.2s;
}
.qa-btn:hover { border-color: var(–green); color: var(–green2); }

/* Typing */
.typing { display:flex; gap:4px; padding:12px 14px; }
.typing span {
width:6px; height:6px; border-radius:50%; background:var(–dim);
animation: bounce 1.2s infinite;
}
.typing span:nth-child(2){animation-delay:0.2s}
.typing span:nth-child(3){animation-delay:0.4s}
@keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-6px)}}

/* COMPOSER */
#composer {
position: fixed; bottom: 0; left: 0; right: 0; z-index: 10;
padding: 10px 12px 18px;
background: linear-gradient(to top, rgba(13,17,23,1) 70%, transparent);
}
.composer-inner {
display: flex; align-items: center; gap: 8px;
background: var(–surface2);
border: 1px solid rgba(255,255,255,0.1);
border-radius: 22px; padding: 8px 12px;
}
#userInput {
flex: 1; background: transparent; border: none; outline: none;
color: var(–text); font-size: 15px; font-family: ‘DM Sans’, sans-serif;
}
#userInput::placeholder { color: var(–dim); }
.send-btn {
width: 38px; height: 38px; border-radius: 50%;
background: var(–green); border: none; color: #fff; font-size: 16px;
display: flex; align-items: center; justify-content: center;
cursor: pointer; box-shadow: 0 4px 12px var(–green-glow); flex-shrink: 0;
}
</style>

</head>
<body>

<!-- ÉCRAN DE CONNEXION -->

<div id="loginScreen">
  <div class="login-card">
    <div class="login-logo">
      <span class="login-ball">⚽</span>
      <div class="login-title">Coach IA</div>
      <div class="login-sub">Assistant Football — Accès Club</div>
    </div>
    <label class="login-label">Clé d'accès de votre club</label>
    <input class="login-input" id="clubKeyInput" type="text" placeholder="Ex: FC-TOURCOING-X7K2" autocomplete="off"/>
    <button class="login-btn" id="loginBtn">Accéder ⚽</button>
    <div class="login-error" id="loginError"></div>
    <div class="login-demo">
      Mode démo : <span onclick="useDemoKey()">DEMO-CLUB-0000</span>
    </div>
  </div>
</div>

<!-- TOPBAR -->

<header id="topbar">
  <div class="logo-area">
    <div class="ball-icon">⚽</div>
    <div class="logo-text">
      <span class="logo-name">Coach IA</span>
      <span class="logo-sub" id="clubName">Assistant Football</span>
    </div>
  </div>
  <div class="status">
    <div class="dot-green"></div>
    En ligne
  </div>
</header>

<!-- CATEGORIES -->

<div id="catBar">
  <div class="cat-chip" onclick="selectCat(this,'U6/U7')">U6 / U7</div>
  <div class="cat-chip active" onclick="selectCat(this,'U8/U9')">U8 / U9</div>
  <div class="cat-chip" onclick="selectCat(this,'U10/U11')">U10 / U11</div>
  <div class="cat-chip" onclick="selectCat(this,'U12/U13')">U12 / U13</div>
  <div class="cat-chip" onclick="selectCat(this,'U14/U15')">U14 / U15</div>
  <div class="cat-chip" onclick="selectCat(this,'Seniors')">Seniors</div>
</div>

<!-- CHAT -->

<div id="chat">
  <div id="messages"></div>
</div>

<!-- COMPOSER -->

<div id="composer">
  <div class="composer-inner">
    <input id="userInput" placeholder="Ex: séance dribble, 12 joueurs, 1h…" type="text"/>
    <button class="send-btn" id="sendBtn">➤</button>
  </div>
</div>

<script>
// ============================================================
// CONFIG
// ============================================================
const API_BASE = "https://philo-backend-by2c.onrender.com";
const COACH_URL = `${API_BASE}/coach`;

// ============================================================
// ÉTAT
// ============================================================
let clubKey = localStorage.getItem("coach_club_key") || "";
let deviceId = localStorage.getItem("coach_device_id");
if (!deviceId) {
  deviceId = "device_" + Math.random().toString(36).slice(2, 12);
  localStorage.setItem("coach_device_id", deviceId);
}
let categorie = "U8/U9";
let userId = "coach_" + (localStorage.getItem("coach_user_id") || Math.random().toString(36).slice(2,10));
localStorage.setItem("coach_user_id", userId.replace("coach_",""));
let isLoading = false;

// ============================================================
// CONNEXION
// ============================================================
const loginScreen = document.getElementById("loginScreen");
const loginBtn = document.getElementById("loginBtn");
const clubKeyInput = document.getElementById("clubKeyInput");
const loginError = document.getElementById("loginError");

function useDemoKey() {
  clubKeyInput.value = "DEMO-CLUB-0000";
}

async function tryLogin() {
  const key = clubKeyInput.value.trim().toUpperCase();
  if (!key) {
    showError("Entrez votre clé d'accès club.");
    return;
  }

  loginBtn.textContent = "Vérification…";
  loginBtn.disabled = true;
  loginError.style.display = "none";

  try {
    const resp = await fetch(COACH_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        message: "Bonjour",
        userId,
        categorie,
        clubKey: key,
        deviceId
      })
    });

    const data = await resp.json();

    if (!resp.ok) {
      showError(data.error || "Clé invalide.");
      loginBtn.textContent = "Accéder ⚽";
      loginBtn.disabled = false;
      return;
    }

    // Connexion réussie
    clubKey = key;
    localStorage.setItem("coach_club_key", clubKey);
    loginScreen.style.display = "none";

    if (data.club) {
      document.getElementById("clubName").textContent = data.club;
    }

    addBubble(`Bonjour coach ! 👋 Je suis votre assistant ${categorie}.\n\nDites-moi ce que vous voulez travailler et j'adapte la séance complète !`, "bot", true);

  } catch (err) {
    showError("Erreur de connexion. Vérifiez votre réseau.");
    loginBtn.textContent = "Accéder ⚽";
    loginBtn.disabled = false;
  }
}

function showError(msg) {
  loginError.textContent = msg;
  loginError.style.display = "block";
}

loginBtn.addEventListener("click", tryLogin);
clubKeyInput.addEventListener("keydown", e => { if (e.key === "Enter") tryLogin(); });

// Si clé déjà en mémoire, on passe directement
if (clubKey) {
  clubKeyInput.value = clubKey;
  tryLogin();
}

// ============================================================
// CATÉGORIES
// ============================================================
function selectCat(el, cat) {
  document.querySelectorAll(".cat-chip").forEach(c => c.classList.remove("active"));
  el.classList.add("active");
  categorie = cat;
  addBubble(`Catégorie changée : ${cat} ⚽ Je m'adapte !`, "bot");
}

// ============================================================
// CHAT UI
// ============================================================
const chat = document.getElementById("chat");
const messages = document.getElementById("messages");

function addBubble(text, who = "bot", withActions = false) {
  const wrap = document.createElement("div");
  wrap.className = `bubble-wrap ${who}`;

  if (who === "bot") {
    wrap.innerHTML = `<div class="avatar">⚽</div><div class="bubble bot"></div>`;
    wrap.querySelector(".bubble").textContent = text;

    if (withActions) {
      const actions = document.createElement("div");
      actions.className = "quick-actions";
      actions.innerHTML = `
        <button class="qa-btn" onclick="quickSend('Séance dribble, 12 joueurs U8, 1h')">🏃 Dribble</button>
        <button class="qa-btn" onclick="quickSend('Séance passe, 10 joueurs, 45min')">⚡ Passe</button>
        <button class="qa-btn" onclick="quickSend('Séance tir au but, 14 joueurs, 1h')">🎯 Tir</button>
        <button class="qa-btn" onclick="quickSend('Séance pressing collectif, 1h')">🛡️ Pressing</button>
        <button class="qa-btn" onclick="quickSend('Rédige un message WhatsApp pour convoquer les joueurs samedi à 10h au stade')">📢 Parents</button>
      `;
      wrap.querySelector(".bubble").appendChild(actions);
    }
  } else {
    wrap.innerHTML = `<div class="bubble user"></div>`;
    wrap.querySelector(".bubble").textContent = text;
  }

  messages.appendChild(wrap);
  requestAnimationFrame(() => chat.scrollTop = chat.scrollHeight);
}

function setTyping(on) {
  if (on) {
    const wrap = document.createElement("div");
    wrap.className = "bubble-wrap bot";
    wrap.id = "typingIndicator";
    wrap.innerHTML = `<div class="avatar">⚽</div><div class="bubble bot"><div class="typing"><span></span><span></span><span></span></div></div>`;
    messages.appendChild(wrap);
    chat.scrollTop = chat.scrollHeight;
  } else {
    document.getElementById("typingIndicator")?.remove();
  }
}

// ============================================================
// ENVOI MESSAGE
// ============================================================
async function sendMessage(text) {
  if (!text || isLoading) return;
  if (!clubKey) { loginScreen.style.display = "flex"; return; }

  addBubble(text, "user");
  isLoading = true;
  setTyping(true);

  try {
    const resp = await fetch(COACH_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message: text, userId, categorie, clubKey, deviceId })
    });

    const data = await resp.json();
    setTyping(false);

    if (!resp.ok) {
      // Abonnement expiré ou limite atteinte
      if (resp.status === 403) {
        addBubble(`🔒 ${data.error}`, "bot");
        // Effacer la clé si invalide
        if (data.error.includes("invalide")) {
          localStorage.removeItem("coach_club_key");
          clubKey = "";
          setTimeout(() => loginScreen.style.display = "flex", 2000);
        }
      } else {
        addBubble("Erreur. Réessaie.", "bot");
      }
    } else {
      addBubble(data.answer || "Pas de réponse.", "bot");
    }
  } catch (err) {
    setTyping(false);
    addBubble("Erreur de connexion. Vérifie ton réseau.", "bot");
    console.error(err);
  }

  isLoading = false;
}

function quickSend(text) {
  sendMessage(text);
}

const userInput = document.getElementById("userInput");
const sendBtn = document.getElementById("sendBtn");

sendBtn.addEventListener("click", () => {
  const text = userInput.value.trim();
  if (!text) return;
  userInput.value = "";
  sendMessage(text);
});

userInput.addEventListener("keydown", e => {
  if (e.key === "Enter") {
    const text = userInput.value.trim();
    if (!text) return;
    userInput.value = "";
    sendMessage(text);
  }
});
</script>

</body>
</html>
