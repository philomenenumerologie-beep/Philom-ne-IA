<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1"/>
<meta name="format-detection" content="telephone=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>

<title>Coach IA — Risquons-Tout Mouscron</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root {
  --red: #cc0000;
  --red2: #ff1a1a;
  --red-glow: rgba(204,0,0,0.3);
  --white: #ffffff;
  --bg-dark: #1a0000;
  --surface: rgba(30,0,0,0.92);
  --dim: #ffaaaa;
  --border: rgba(204,0,0,0.3);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  color: #fff; font-family: 'DM Sans', sans-serif;
  height: 100vh; display: flex; flex-direction: column;
  overflow: hidden; position: relative;
  -webkit-touch-callout: none;
}
.bubble { -webkit-user-select: text; user-select: text; -webkit-touch-callout: none; }
.qa-btn, .send-btn, .mode-tab, .cat-chip, .login-btn {
  -webkit-user-select: none; user-select: none; -webkit-touch-callout: none;
}
#pitch { position: fixed; inset: 0; z-index: 0; overflow: hidden; }
.pitch-bg { width: 100%; height: 100%; background: repeating-linear-gradient(180deg, #1a4a1a 0px, #1a4a1a 40px, #1e5c1e 40px, #1e5c1e 80px); }
.pitch-svg { position: absolute; inset: 0; width: 100%; height: 100%; }
#overlay { position: fixed; inset: 0; z-index: 1; background: rgba(0,0,0,0.55); }

/* LOGIN */
#loginScreen { position: fixed; inset: 0; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; background: rgba(0,0,0,0.7); }
.login-card { background: rgba(255,255,255,0.1); border: 1px solid rgba(204,0,0,0.4); border-radius: 20px; padding: 28px 24px; width: 100%; max-width: 380px; box-shadow: 0 20px 40px rgba(0,0,0,0.6); backdrop-filter: blur(20px); }
.login-logo { text-align: center; margin-bottom: 20px; }
.login-badge { margin-bottom: 10px; }
.login-title { font-family: 'Barlow Condensed', sans-serif; font-size: 26px; font-weight: 800; color: #fff; text-transform: uppercase; letter-spacing: 0.05em; }
.login-club { font-size: 13px; color: var(--red2); font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; margin-top: 2px; }
.login-label { display: block; font-size: 12px; color: #ffaaaa; margin-bottom: 8px; margin-top: 16px; text-transform: uppercase; letter-spacing: 0.08em; }
.login-input { width: 100%; background: rgba(255,255,255,0.12); border: 1px solid rgba(204,0,0,0.4); border-radius: 12px; padding: 14px 16px; color: #fff; -webkit-text-fill-color: #fff; font-size: 16px; font-family: 'DM Sans', sans-serif; outline: none; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 16px; }
.login-input::placeholder { text-transform: none; letter-spacing: 0; color: rgba(255,255,255,0.4); }
.login-btn { width: 100%; padding: 14px; background: var(--red); border: none; border-radius: 12px; color: #fff; font-size: 16px; font-weight: 700; cursor: pointer; font-family: 'DM Sans', sans-serif; box-shadow: 0 4px 16px var(--red-glow); }
.login-error { margin-top: 12px; padding: 10px 14px; background: rgba(248,81,73,0.1); border: 1px solid rgba(248,81,73,0.3); border-radius: 10px; color: #f85149; font-size: 13px; text-align: center; display: none; }

/* TOPBAR */
#topbar { position: relative; z-index: 10; display: flex; align-items: center; justify-content: space-between; padding: 10px 16px; background: linear-gradient(135deg, rgba(10,0,0,0.98), rgba(40,0,0,0.98)); border-bottom: 3px solid var(--red); box-shadow: 0 4px 20px rgba(0,0,0,0.8); }
.logo-area { display: flex; align-items: center; gap: 12px; }
.logo-text { display: flex; flex-direction: column; }
.logo-name { font-family: 'Barlow Condensed', sans-serif; font-size: 18px; font-weight: 800; color: #fff; letter-spacing: 0.08em; text-transform: uppercase; text-shadow: 0 0 10px rgba(204,0,0,0.8); }
.logo-club { font-size: 11px; color: var(--red2); letter-spacing: 0.1em; text-transform: uppercase; font-weight: 700; }
.status { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #ffaaaa; }
.dot-green { width: 7px; height: 7px; border-radius: 50%; background: #4ade80; box-shadow: 0 0 6px #4ade80; animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

#anniversary { position: relative; z-index: 9; text-align: center; padding: 4px; background: linear-gradient(90deg, transparent, rgba(204,0,0,0.4), transparent); font-family: 'Barlow Condensed', sans-serif; font-size: 11px; color: rgba(255,200,200,0.8); letter-spacing: 0.2em; text-transform: uppercase; }

/* TABS */
#modeBar { position: relative; z-index: 9; display: flex; background: rgba(10,0,0,0.9); border-bottom: 1px solid rgba(204,0,0,0.2); }
.mode-tab { flex: 1; padding: 10px; text-align: center; font-family: 'Barlow Condensed', sans-serif; font-size: 14px; font-weight: 700; color: rgba(255,255,255,0.5); cursor: pointer; letter-spacing: 0.05em; text-transform: uppercase; border-bottom: 3px solid transparent; transition: all 0.2s; }
.mode-tab.active { color: #fff; border-bottom-color: var(--red); }

/* CATEGORIES */
#catBar { position: relative; z-index: 9; display: flex; gap: 8px; padding: 8px 14px; background: rgba(5,0,0,0.8); border-bottom: 1px solid rgba(204,0,0,0.15); overflow-x: auto; scrollbar-width: none; }
#catBar::-webkit-scrollbar { display: none; }
.cat-chip { padding: 5px 12px; border-radius: 20px; background: rgba(255,255,255,0.07); border: 1px solid rgba(204,0,0,0.2); color: #ffaaaa; font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; white-space: nowrap; }
.cat-chip.active { background: var(--red); border-color: var(--red); color: #fff; }

/* SECTIONS */
#sectionCoach { display: flex; flex-direction: column; flex: 1; overflow: hidden; }
#sectionPrepa { display: none; flex-direction: column; flex: 1; overflow: hidden; }

/* CHAT */
#chat, #chatPrepa { flex: 1; overflow-y: auto; padding: 16px 14px 120px; position: relative; z-index: 2; }
.bubble-wrap { display: flex; margin-bottom: 14px; animation: fadeUp 0.3s ease; }
@keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
.bubble-wrap.bot { justify-content: flex-start; }
.bubble-wrap.user { justify-content: flex-end; }
.avatar { width: 32px; height: 32px; border-radius: 50%; background: rgba(0,0,0,0.7); border: 1.5px solid var(--red); display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-right: 8px; margin-top: 2px; overflow: hidden; }
.bubble { max-width: min(85%, 360px); padding: 11px 14px; border-radius: 16px; font-size: 14px; line-height: 1.6; }
.bubble.bot { background: rgba(20,0,0,0.92); border: 1px solid rgba(204,0,0,0.2); border-top-left-radius: 4px; color: #fff; -webkit-text-fill-color: #fff; }
.bubble.user { background: rgba(100,0,0,0.8); border: 1px solid rgba(204,0,0,0.4); border-top-right-radius: 4px; color: #fff; -webkit-text-fill-color: #fff; }

/* EXERCISE CARDS */
.ex-card { background: rgba(40,0,0,0.6); border: 1px solid rgba(204,0,0,0.3); border-radius: 12px; margin-top: 10px; overflow: hidden; }
.ex-card-header { display: flex; align-items: center; justify-content: space-between; padding: 9px 14px; background: rgba(204,0,0,0.15); border-bottom: 1px solid rgba(204,0,0,0.2); }
.ex-card-title { font-family: 'Barlow Condensed', sans-serif; font-size: 14px; font-weight: 700; color: #ff6666; letter-spacing: 0.05em; text-transform: uppercase; }
.ex-card-dur { font-size: 11px; color: #ffaaaa; background: rgba(255,255,255,0.06); padding: 2px 8px; border-radius: 10px; white-space: nowrap; }
.ex-card-body { padding: 10px 14px; }
.ex-line { font-size: 13px; color: #ffdddd; line-height: 1.7; padding: 2px 0; }
.ex-line.consigne { color: #ffbbbb; padding-left: 8px; border-left: 2px solid rgba(204,0,0,0.4); margin: 3px 0; }
.rt-text-block { font-size: 14px; color: #ffdddd; line-height: 1.7; white-space: pre-wrap; }
.rt-text-block strong { color: #fff; font-weight: 600; }

/* BOUTON ECOUTER */
.speak-btn { display: inline-flex; align-items: center; gap: 5px; margin-top: 8px; padding: 5px 12px; background: rgba(204,0,0,0.15); border: 1px solid rgba(204,0,0,0.35); border-radius: 20px; color: #ff9999; font-size: 12px; cursor: pointer; font-family: 'DM Sans', sans-serif; }
.speak-btn.speaking { background: rgba(204,0,0,0.3); border-color: var(--red); }

.quick-actions { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
.qa-btn { padding: 8px 12px; background: rgba(204,0,0,0.15); border: 1px solid rgba(204,0,0,0.3); border-radius: 20px; color: #fff; font-size: 13px; cursor: pointer; font-family: 'DM Sans', sans-serif; }

/* SCHEMA */
.schema-wrap { margin-top: 12px; border-radius: 12px; overflow: hidden; border: 1px solid rgba(204,0,0,0.3); }
.schema-header { padding: 8px 12px; background: rgba(204,0,0,0.2); font-size: 11px; color: #ff6666; text-transform: uppercase; letter-spacing: 0.1em; font-weight: 600; }
.schema-desc { padding: 5px 12px 8px; background: rgba(0,0,0,0.4); font-size: 12px; color: #ffaaaa; font-style: italic; }
.schema-svg-box svg { width: 100%; display: block; }
.schema-legend { display: flex; gap: 12px; padding: 6px 12px 8px; background: rgba(0,0,0,0.4); font-size: 10px; color: rgba(255,255,255,0.6); flex-wrap: wrap; }
.legend-item { display: flex; align-items: center; gap: 4px; }

/* EXCEL */
.excel-guide-card { margin-top: 10px; background: rgba(0,60,20,0.6); border: 1px solid rgba(80,200,100,0.3); border-radius: 12px; padding: 12px 14px; }
.excel-guide-title { font-size: 12px; font-weight: 700; color: #4ade80; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }
.excel-guide-example { font-size: 12px; color: rgba(255,255,255,0.7); font-style: italic; background: rgba(0,0,0,0.3); border-radius: 8px; padding: 8px 10px; margin-top: 6px; border-left: 3px solid #4ade80; white-space: pre-wrap; }

/* TYPING */
.typing { display:flex; gap:4px; padding:12px 14px; }
.typing span { width:6px; height:6px; border-radius:50%; background:var(--dim); animation: bounce 1.2s infinite; }
.typing span:nth-child(2){animation-delay:0.2s} .typing span:nth-child(3){animation-delay:0.4s}
@keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-6px)}}

/* COMPOSER */
#composer { position: fixed; bottom: 0; left: 0; right: 0; z-index: 10; padding: 10px 12px 18px; background: linear-gradient(to top, rgba(10,0,0,0.97) 70%, transparent); }
.composer-inner { display: flex; align-items: center; gap: 8px; background: rgba(30,0,0,0.95); border: 1px solid rgba(204,0,0,0.3); border-radius: 22px; padding: 8px 12px; }
.composer-input { flex: 1; background: transparent; border: none; outline: none; color: #fff; -webkit-text-fill-color: #fff; font-size: 15px; font-family: 'DM Sans', sans-serif; }
.composer-input::placeholder { color: #ffaaaa; -webkit-text-fill-color: #ffaaaa; }
.send-btn { width: 38px; height: 38px; border-radius: 50%; background: var(--red); border: none; color: #fff; font-size: 16px; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; box-shadow: 0 4px 12px var(--red-glow); }
</style>
</head>

<script>
var API_BASE = "https://philo-backend-by2c.onrender.com";
var COACH_URL = API_BASE + "/coach";

var clubKey = localStorage.getItem("rt_club_key") || "";
var deviceId = localStorage.getItem("rt_device_id");
if (!deviceId) { deviceId = "device_" + Math.random().toString(36).slice(2,12); localStorage.setItem("rt_device_id", deviceId); }
var categorie = "U8/U9";
var userId = "rt_" + (localStorage.getItem("rt_user_id") || Math.random().toString(36).slice(2,10));
localStorage.setItem("rt_user_id", userId.replace("rt_",""));
var isLoading = false;
var currentMode = "coach";
var waitingForExcelData = false;
var excelDataType = null;
var currentUtterance = null;

// Précharger voix TTS
if (window.speechSynthesis) {
  window.speechSynthesis.getVoices();
  window.speechSynthesis.onvoiceschanged = function() { window.speechSynthesis.getVoices(); };
}

var avatarSVG = '<svg width="28" height="28" viewBox="0 0 100 100"><circle cx="50" cy="50" r="48" fill="#111" stroke="#cc0000" stroke-width="3"/><text x="50" y="58" text-anchor="middle" font-family="Arial Black" font-size="28" font-weight="900" fill="white">RT</text></svg>';

// ===== TTS =====
function speakCardEl(btn) {
  var card = btn.closest('.ex-card');
  if (!card) return;
  var text = (card.textContent || card.innerText || '').replace(/🔊\s*Écouter/g,'').replace(/⏹\s*Stop/g,'').replace(/\s+/g,' ').trim();
  speakText(btn, text);
}

function speakBubbleEl(btn) {
  var bubble = btn.closest('.bubble');
  if (!bubble) return;
  var text = (bubble.textContent || bubble.innerText || '').replace(/🔊\s*Écouter/g,'').replace(/⏹\s*Stop/g,'').replace(/\s+/g,' ').trim();
  speakText(btn, text);
}

function speakText(btn, text) {
  if (!window.speechSynthesis) return;
  if (window.speechSynthesis.speaking) {
    window.speechSynthesis.cancel();
    document.querySelectorAll('.speak-btn').forEach(function(b) { b.classList.remove('speaking'); b.textContent = '🔊 Écouter'; });
    currentUtterance = null;
    return;
  }
  var utt = new SpeechSynthesisUtterance(text);
  utt.lang = 'fr-FR'; utt.rate = 0.95;
  var voices = window.speechSynthesis.getVoices();
  var frVoice = voices.find(function(v) { return v.lang && v.lang.startsWith('fr'); });
  if (frVoice) utt.voice = frVoice;
  currentUtterance = utt;
  btn.classList.add('speaking'); btn.textContent = '⏹ Stop';
  utt.onend = function() { btn.classList.remove('speaking'); btn.textContent = '🔊 Écouter'; currentUtterance = null; };
  utt.onerror = function() { btn.classList.remove('speaking'); btn.textContent = '🔊 Écouter'; currentUtterance = null; };
  window.speechSynthesis.speak(utt);
}

// ===== MARKDOWN PARSER =====
function parseMarkdown(text) {
  var hasStruct = /\*\*(Séance|Échauffement|Echauffement|Exercice|Match|Conclusion|Objectif|Matériel|Consignes|Durée|Joueurs)/i.test(text);
  if (!hasStruct) {
    var html = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br/>');
    return '<div class="rt-text-block">'+html+'</div>';
  }
  var lines = text.split('\n');
  var cards = [], currentCard = null, introLines = [], inIntro = true;
  lines.forEach(function(line) {
    var boldTitle = line.match(/^\*\*(.+?)\*\*\s*(\((\d+\s*(?:minutes?|min|heures?|h))\))?$/i);
    var boldColon = line.match(/^\*\*(.+?)\s*:\*\*\s*(.*)$/);
    if (boldTitle) {
      inIntro = false;
      if (currentCard) cards.push(currentCard);
      currentCard = { title: boldTitle[1].trim(), dur: boldTitle[3]||'', lines: [] };
    } else if (boldColon) {
      var val = boldColon[2].replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
      var key = boldColon[1];
      if (currentCard) currentCard.lines.push({ text: '<strong>'+key+' :</strong> '+val, consigne: false });
      else introLines.push('<div class="ex-line"><strong>'+key+' :</strong> '+val+'</div>');
    } else {
      var clean = line.replace(/^\s*[-–•\d\.]\s*/,'').replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').trim();
      if (!clean) return;
      var isConsigne = /^\s{2,}/.test(line) || (/^\s*[-–\d]/.test(line) && currentCard && currentCard.lines.some(function(l) { return l.text.includes('Consignes'); }));
      if (inIntro) introLines.push('<div class="ex-line">'+clean+'</div>');
      else if (currentCard) currentCard.lines.push({ text: clean, consigne: isConsigne });
    }
  });
  if (currentCard) cards.push(currentCard);
  var html = '';
  if (introLines.length) html += '<div style="margin-bottom:8px">'+introLines.join('')+'</div>';
  cards.forEach(function(card) {
    var t = card.title.toLowerCase();
    var emoji = t.includes('échauffement')||t.includes('echauffement') ? '🔥 ' : t.includes('exercice 1') ? '⚡ ' : t.includes('exercice 2') ? '💥 ' : t.includes('exercice 3') ? '🎯 ' : t.includes('match')||t.includes('jeu') ? '🏁 ' : t.includes('conclusion') ? '✅ ' : t.includes('tir') ? '🎯 ' : t.includes('dribble') ? '🏃 ' : t.includes('passe') ? '⚡ ' : t.includes('pressing') ? '💥 ' : '';
    html += '<div class="ex-card"><div class="ex-card-header"><span class="ex-card-title">'+emoji+card.title+'</span>';
    if (card.dur) html += '<span class="ex-card-dur">'+card.dur+'</span>';
    html += '</div><div class="ex-card-body">';
    card.lines.forEach(function(l) { html += '<div class="ex-line'+(l.consigne?' consigne':'')+'">'+l.text+'</div>'; });
    html += '<button class="speak-btn" onclick="speakCardEl(this)">🔊 Écouter</button>';
    html += '</div></div>';
  });
  return html;
}

// ===== SCHEMA =====
function buildProSchema(schema) {
  if (!schema) return null;
  var W = 320, H = 220;
  var px = function(p) { return 10 + p * (W-20) / 100; };
  var py = function(p) { return 10 + p * (H-20) / 100; };
  var PLAYER_COLOR = "#cc0000", PLOT_COLOR = "#ffffff", BALL_PATH = "#ffffff", MOVE_PATH = "#ff6666";
  var defs = '<defs><marker id="arrowBall" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="'+BALL_PATH+'" opacity="0.9"/></marker><marker id="arrowMove" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="'+MOVE_PATH+'"/></marker></defs>';
  var elements = [];
  elements.push('<rect width="'+W+'" height="'+H+'" fill="#1a4a1a" rx="8"/>');
  elements.push('<defs><pattern id="grassRT" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse"><rect width="40" height="40" fill="#1a4a1a"/><rect width="40" height="20" fill="#1e5c1e"/></pattern></defs>');
  elements.push('<rect width="'+W+'" height="'+H+'" fill="url(#grassRT)" rx="8"/>');
  elements.push('<rect x="5" y="5" width="'+(W-10)+'" height="'+(H-10)+'" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1.5" rx="3"/>');
  var pos = {};
  if (schema.players) schema.players.forEach(function(p) { pos[p.id] = [px(p.x), py(p.y)]; });
  if (schema.plots) schema.plots.forEach(function(p,i) { pos["plot_"+i] = [px(p.x), py(p.y)]; });
  if (schema.goal) { var gx=px(schema.goal.x),gy=py(schema.goal.y); elements.push('<rect x="'+(gx-22)+'" y="'+(gy-6)+'" width="44" height="12" fill="none" stroke="white" stroke-width="2" rx="1"/>'); elements.push('<text x="'+gx+'" y="'+(gy+22)+'" text-anchor="middle" font-size="8" fill="white" font-weight="bold">BUT</text>'); }
  if (schema.ball_paths) schema.ball_paths.forEach(function(path) { var f=pos[path.from],t=pos[path.to]; if(!f||!t)return; elements.push('<line x1="'+f[0]+'" y1="'+f[1]+'" x2="'+t[0]+'" y2="'+t[1]+'" stroke="'+BALL_PATH+'" stroke-width="2.5" stroke-dasharray="7,4" marker-end="url(#arrowBall)"/>'); });
  if (schema.player_paths) schema.player_paths.forEach(function(path) { var f=pos[path.from],t=pos[path.to]; if(!f||!t)return; elements.push('<line x1="'+f[0]+'" y1="'+f[1]+'" x2="'+t[0]+'" y2="'+t[1]+'" stroke="'+MOVE_PATH+'" stroke-width="2" marker-end="url(#arrowMove)"/>'); });
  if (schema.plots) schema.plots.forEach(function(p) { var x=px(p.x),y=py(p.y); elements.push('<polygon points="'+x+','+(y-7)+' '+(x-5)+','+(y+4)+' '+(x+5)+','+(y+4)+'" fill="'+PLOT_COLOR+'" stroke="rgba(0,0,0,0.3)" stroke-width="0.5"/>'); });
  if (schema.players) schema.players.forEach(function(p) { var x=px(p.x),y=py(p.y); elements.push('<circle cx="'+x+'" cy="'+y+'" r="10" fill="'+PLAYER_COLOR+'" stroke="white" stroke-width="1.5"/>'); elements.push('<text x="'+x+'" y="'+(y+4)+'" text-anchor="middle" font-size="8" font-weight="bold" fill="white">'+p.id+'</text>'); });
  if (schema.distance) { elements.push('<rect x="5" y="'+(H-18)+'" width="'+(W-10)+'" height="14" fill="rgba(0,0,0,0.6)" rx="2"/>'); elements.push('<text x="'+(W/2)+'" y="'+(H-8)+'" text-anchor="middle" font-size="9" fill="rgba(255,255,255,0.9)">'+schema.distance+'</text>'); }
  return '<svg viewBox="0 0 '+W+' '+H+'" xmlns="http://www.w3.org/2000/svg">'+defs+elements.join("")+'</svg>';
}

function renderSchema(schema) {
  if (!schema) return "";
  var svgHtml = buildProSchema(schema);
  if (!svgHtml) return "";
  return '<div class="schema-wrap"><div class="schema-header">📐 Schéma de l\'exercice</div>'+(schema.description?'<div class="schema-desc">'+schema.description+'</div>':'')+'<div class="schema-svg-box">'+svgHtml+'</div><div class="schema-legend"><div class="legend-item"><svg width="14" height="14"><circle cx="7" cy="7" r="6" fill="#cc0000" stroke="white" stroke-width="1"/></svg> Joueur</div><div class="legend-item"><svg width="14" height="14"><polygon points="7,1 2,12 12,12" fill="white"/></svg> Plot</div><div class="legend-item"><svg width="22" height="10"><line x1="0" y1="5" x2="18" y2="5" stroke="white" stroke-width="2.5" stroke-dasharray="5,3"/></svg> Ballon</div><div class="legend-item"><svg width="22" height="10"><line x1="0" y1="5" x2="18" y2="5" stroke="#ff6666" stroke-width="2"/></svg> Déplacement</div></div></div>';
}

async function tryLogin() {

  loginBtn.textContent = "Vérification…"; loginBtn.disabled = true; loginError.style.display = "none";
  try {
    var resp = await fetch(COACH_URL, { method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify({message:"Bonjour", userId, categorie, clubKey:key, deviceId}) });
    var data = await resp.json();
    if (!resp.ok) { loginError.textContent = data.error||"Clé invalide."; loginError.style.display="block"; loginBtn.textContent="Accéder ⚽"; loginBtn.disabled=false; return; }
    clubKey = key; localStorage.setItem("rt_club_key", clubKey);
    loginScreen.style.display = "none";

}

  var bubble = document.createElement("div"); bubble.className = "bubble bot";
  // Utiliser le parser markdown
  bubble.innerHTML = parseMarkdown(text);
  if (schema) bubble.insertAdjacentHTML("beforeend", renderSchema(schema));
  if (withActions) {
    var actions = document.createElement("div"); actions.className = "quick-actions";
    actions.innerHTML =
      '<button class="qa-btn" onclick="sendMessage(\'Seance dribble 12 joueurs 1h\')">🏃 Dribble</button>' +
      '<button class="qa-btn" onclick="sendMessage(\'Seance passe triangle 10 joueurs 45min\')">⚡ Passe</button>' +
      '<button class="qa-btn" onclick="sendMessage(\'Seance tir au but 14 joueurs 1h\')">🎯 Tir</button>' +
      '<button class="qa-btn" onclick="sendMessage(\'Seance pressing collectif 1h\')">🛡️ Pressing</button>' +
      '<button class="qa-btn" onclick="sendMessage(\'Redige message WhatsApp convocation match samedi 10h\')">📢 Parents</button>';
    bubble.appendChild(actions);

  // Bouton écouter global si pas de cartes individuelles

    wrap.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }, 100);

function askExcelData(type) {

async function generateExcelFromText(userText) {
  setTyping(true);
  var today = new Date().toLocaleDateString("fr-FR");
  var prompt = "Réponds UNIQUEMENT avec un JSON valide, sans markdown, sans texte avant ou après. Format exact : {\"sheets\":[{\"name\":\"Nom\",\"headers\":[\"Col1\",\"Col2\"],\"rows\":[[\"val1\",\"val2\"]]}],\"summary\":\"phrase courte\"}. Tests physiques : headers = Joueur, Type de test, Résultat, Date, Remarques. Présence : headers = Joueur, Statut (Présent/Absent/Retard), Remarques, Date. Si les deux types : deux feuilles séparées. Date si non précisée : " + today + ". Données à traiter : " + userText;
  try {
    var resp = await fetch(API_BASE + "/prepa", { method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify({message:prompt, userId:userId+"_excel", categorie, clubKey, deviceId}) });
    var data = await resp.json();
    setTyping(false);
    if (!resp.ok) { addBotMsgPrepa("Erreur serveur : " + (data.error||"Problème de connexion."), false); return; }
    var raw = (data.answer||"").replace(/```json/g,"").replace(/```/g,"").trim();
    var match = raw.match(/\{[\s\S]*\}/);
    var parsed = JSON.parse(match ? match[0] : raw);
    if (!parsed.sheets || parsed.sheets.length === 0) { addBotMsgPrepa("Aucune donnée détectée. Vérifiez votre saisie.", false); return; }
    var wb = XLSX.utils.book_new();
    parsed.sheets.forEach(function(sheet) {
      var wsData = [sheet.headers].concat(sheet.rows);
      var ws = XLSX.utils.aoa_to_sheet(wsData);
      ws["!cols"] = sheet.headers.map(function() { return {wch:22}; });
      XLSX.utils.book_append_sheet(wb, ws, (sheet.name||"Données").slice(0,31));
    });
    var date = new Date().toLocaleDateString("fr-FR").replace(/\//g,"-");
    XLSX.writeFile(wb, "RT_Mouscron_" + date + ".xlsx");
    addBotMsgPrepa("✅ " + (parsed.summary||"Fichier Excel généré !") + "\n\nLe téléchargement a démarré. 📥", false);
  } catch(e) { setTyping(false); addBotMsgPrepa("Erreur de connexion. Réessayez.", false); }
  waitingForExcelData = false; excelDataType = null;
  document.getElementById("userInput").placeholder = "Ex: Test bip Yanis niveau 12 palier 3…";
}

// ===== SEND =====
async function sendMessage(text) {
  if (!text || isLoading) return;
  if (!clubKey) { loginScreen.style.display = "flex"; return; }
  addUserMsg(text); isLoading = true; setTyping(true);
  try {
    var resp = await fetch(COACH_URL, { method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify({message:"Catégorie : "+categorie+". "+text, userId, categorie, clubKey, deviceId}) });
    var data = await resp.json();
    setTyping(false);
    if (!resp.ok) { addBotMsg("Erreur : "+(data.error||"Problème de connexion."), null, false); }
    else { addBotMsg(data.answer||"Pas de réponse.", data.schema||null, false); }
  } catch(e) { setTyping(false); addBotMsg("Erreur de connexion.", null, false); }
  isLoading = false;
}

async function sendMessagePrepa(text) {
  if (!text || isLoading) return;
  if (!clubKey) { loginScreen.style.display = "flex"; return; }
  if (waitingForExcelData) { addUserMsgPrepa(text); isLoading = true; await generateExcelFromText(text); isLoading = false; return; }
  addUserMsgPrepa(text); isLoading = true; setTyping(true);
  try {
    var resp = await fetch(API_BASE + "/prepa", { method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify({message:text, userId:userId+"_prepa", categorie, clubKey, deviceId}) });
    var data = await resp.json();
    setTyping(false);
    if (!resp.ok) { addBotMsgPrepa("Erreur : "+(data.error||"Problème de connexion."), false); }
    else { addBotMsgPrepa(data.answer||"Pas de réponse.", false); }
  } catch(e) { setTyping(false); addBotMsgPrepa("Erreur de connexion.", false); }
  isLoading = false;
}

var userInput = document.getElementById("userInput");
document.getElementById("sendBtn").addEventListener("click", function() {
  var text = userInput.value.trim(); if (!text) return;
  userInput.value = "";
  if (currentMode === "coach") sendMessage(text); else sendMessagePrepa(text);
});
userInput.addEventListener("keydown", function(e) {
  if (e.key === "Enter") {
    var text = userInput.value.trim(); if (!text) return;
    userInput.value = "";
    if (currentMode === "coach") sendMessage(text); else sendMessagePrepa(text);
  }
});
