<!DOCTYPE html>

<html lang="fr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Philomène I.A. — Votre Assistante IA Personnelle</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: #0d0a14; color: #f0ecff; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
body::before { content: ''; position: fixed; inset: 0; z-index: 0; background: radial-gradient(ellipse 70% 50% at 10% 10%, rgba(100,40,200,0.3) 0%, transparent 60%), radial-gradient(ellipse 60% 70% at 90% 90%, rgba(160,20,60,0.2) 0%, transparent 60%); pointer-events: none; }
#splash { position: fixed; inset: 0; z-index: 200; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #0d0a14; transition: opacity 0.8s ease; }
#splash.gone { opacity: 0; pointer-events: none; }
.splash-top { font-size: 11px; letter-spacing: 0.4em; text-transform: uppercase; color: rgba(255,255,255,0.45); margin-bottom: 20px; animation: up 0.7s ease 0.2s both; }
.splash-name { font-family: 'Cormorant Garamond', serif; font-size: 70px; font-weight: 700; color: #d4a017; letter-spacing: 0.06em; animation: up 0.7s ease 0.5s both; }
.splash-bar { width: 2px; height: 50px; background: linear-gradient(180deg, transparent, #d4a017, transparent); margin: 22px auto; animation: up 0.7s ease 0.7s both; }
.splash-bas { font-family: 'Cormorant Garamond', serif; font-size: 15px; font-style: italic; color: rgba(255,255,255,0.45); animation: up 0.7s ease 0.9s both; }
@keyframes up { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }
#topbar { position: relative; z-index: 10; display: flex; align-items: center; justify-content: space-between; padding: 13px 16px; background: rgba(13,10,20,0.95); border-bottom: 1px solid rgba(212,160,23,0.3); }
.logo-area { display: flex; align-items: center; gap: 10px; }
.logo-gem { width: 38px; height: 38px; border-radius: 10px; background: linear-gradient(135deg, #5b21b6, #9f1239); display: flex; align-items: center; justify-content: center; font-size: 20px; }
.logo-name { font-family: 'Cormorant Garamond', serif; font-size: 19px; font-weight: 700; color: #d4a017; }
.logo-sub { font-size: 9px; color: rgba(255,255,255,0.4); letter-spacing: 0.12em; text-transform: uppercase; }
.status { display: flex; align-items: center; gap: 5px; font-size: 11px; color: rgba(255,255,255,0.5); }
.dot { width: 6px; height: 6px; border-radius: 50%; background: #4ade80; box-shadow: 0 0 6px #4ade80; animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
#chat { flex: 1; overflow-y: auto; padding: 18px 14px 140px; position: relative; z-index: 2; }
.bubble-wrap { display: flex; margin-bottom: 14px; animation: fadeUp 0.35s ease; }
@keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
.bubble-wrap.bot { justify-content: flex-start; }
.bubble-wrap.user { justify-content: flex-end; }
.avatar { width: 34px; height: 34px; border-radius: 50%; background: linear-gradient(135deg, #5b21b6, #9f1239); display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-right: 9px; margin-top: 3px; font-size: 16px; }
.bubble { max-width: min(84%, 380px); padding: 12px 15px; font-size: 14px; line-height: 1.7; white-space: pre-wrap; border-radius: 18px; }
.bubble.bot { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.14); border-top-left-radius: 4px; color: #f0ecff; }
.bubble.user { background: linear-gradient(135deg, #5b21b6, #7c3aed); border-top-right-radius: 4px; color: #ffffff; }
.choices { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
.choice-btn { padding: 10px 14px; background: rgba(124,58,237,0.18); border: 1.5px solid rgba(124,58,237,0.5); border-radius: 12px; color: #c4b5fd; font-size: 13px; cursor: pointer; font-family: 'DM Sans', sans-serif; font-weight: 500; text-align: left; line-height: 1.4; }
.choice-btn:active { background: rgba(124,58,237,0.35); }
.devis-card { background: rgba(212,160,23,0.08); border: 1.5px solid rgba(212,160,23,0.3); border-radius: 16px; padding: 16px; margin-top: 12px; }
.devis-nom { font-family: 'Cormorant Garamond', serif; font-size: 20px; font-weight: 700; color: #d4a017; margin-bottom: 6px; }
.devis-desc { font-size: 12px; color: rgba(255,255,255,0.55); margin-bottom: 14px; line-height: 1.5; }
.devis-features { margin-bottom: 14px; }
.devis-feature { display: flex; align-items: flex-start; gap: 8px; font-size: 13px; color: #f0ecff; padding: 5px 0; border-bottom: 1px solid rgba(255,255,255,0.06); }
.check { color: #4ade80; flex-shrink: 0; }
.devis-prix-wrap { display: flex; gap: 10px; margin-bottom: 12px; }
.devis-prix { flex: 1; text-align: center; background: rgba(0,0,0,0.35); border-radius: 10px; padding: 10px 8px; border: 1px solid rgba(255,255,255,0.08); }
.prix-label { font-size: 10px; color: rgba(255,255,255,0.45); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 4px; }
.prix-val { font-family: 'Cormorant Garamond', serif; font-size: 26px; font-weight: 700; color: #d4a017; }
.prix-unit { font-size: 10px; color: rgba(255,255,255,0.4); }
.devis-install { text-align: center; font-size: 12px; color: rgba(255,255,255,0.5); margin-bottom: 14px; padding: 8px; background: rgba(255,255,255,0.05); border-radius: 8px; }
.devis-install strong { color: #f0ecff; }
.whatsapp-btn { display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; padding: 14px; background: linear-gradient(135deg, #128C7E, #25D366); border: none; border-radius: 12px; color: #ffffff; font-size: 15px; font-weight: 700; cursor: pointer; font-family: 'DM Sans', sans-serif; text-decoration: none; }
.typing { display:flex; gap:5px; padding:12px 15px; }
.typing span { width:6px; height:6px; border-radius:50%; background: #7c3aed; animation: bounce 1.2s infinite; }
.typing span:nth-child(2){animation-delay:0.2s} .typing span:nth-child(3){animation-delay:0.4s}
@keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-7px)}}
#composer { position: fixed; bottom: 0; left: 0; right: 0; z-index: 10; padding: 10px 14px 24px; background: linear-gradient(to top, #0d0a14 75%, transparent); }
.composer-inner { display: flex; align-items: center; gap: 10px; background: rgba(255,255,255,0.09); border: 1.5px solid rgba(124,58,237,0.4); border-radius: 16px; padding: 10px 14px; }
#userInput { flex: 1; background: transparent; border: none; outline: none; color: #f0ecff; font-size: 15px; font-family: 'DM Sans', sans-serif; caret-color: #7c3aed; }
#userInput::placeholder { color: rgba(255,255,255,0.3); }
.send-btn { width: 50px; height: 50px; border-radius: 12px; background: linear-gradient(135deg, #5b21b6, #7c3aed); border: none; color: #ffffff; font-size: 20px; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; }
</style>
</head>
<body>

<div id="splash">
  <div class="splash-top">Assistants IA Personnalisés</div>
  <div class="splash-name">Philomène</div>
  <div class="splash-bar"></div>
  <div class="splash-bas">Votre assistante intelligente, disponible 24h/24</div>
</div>

<header id="topbar">
  <div class="logo-area">
    <div class="logo-gem">✨</div>
    <div>
      <div class="logo-name">Philomène I.A.</div>
      <div class="logo-sub">Assistants IA pour Professionnels</div>
    </div>
  </div>
  <div class="status"><div class="dot"></div>En ligne</div>
</header>

<div id="chat"><div id="messages"></div></div>

<div id="composer">
  <div class="composer-inner">
    <input id="userInput" placeholder="Répondez ou posez une question…" type="text"/>
    <button class="send-btn" id="sendBtn">➤</button>
  </div>
</div>

<script>
const API_BASE = "https://philo-backend-by2c.onrender.com";
const WHATSAPP_NUM = "33617123910";
let etape = "accueil";
let profil = {};
let isLoading = false;

const SF = [
  "Séances complètes selon la catégorie",
  "Schémas d'exercices automatiques",
  "Rédaction des messages aux parents",
  "Préparation physique des joueurs",
  "Accessible depuis votre téléphone",
  "Personnalisée aux couleurs du club"
];

const TARIFS = {
  artisan: {
    nom:"Assistant Artisan", emoji:"🔧",
    desc:"Philomène répond à vos clients 24h/24, génère des devis avec analyse photo, gère les urgences et rédige vos messages.",
    features:["Devis automatiques avec estimation matériaux","Analyse de photos de chantier","Bouton urgence pour vos clients","Réponses automatiques 24h/24","Rédaction de mails et messages","Personnalisée à votre nom et couleurs"],
    mensuel:"24", annuel:"240", install:"99"
  },
  sport_solo: { nom:"Coach IA Solo — 1 coach", emoji:"🏃", desc:"Philomène génère vos séances complètes en quelques secondes, avec schémas d'exercices et rédaction des messages aux parents.", features:SF, mensuel:"5", annuel:"50", install:"49" },
  sport_mini: { nom:"Coach IA Mini Club — jusqu'à 5 coachs", emoji:"⚽", desc:"Philomène assiste jusqu'à 5 coachs de votre club avec séances complètes, schémas et communication parents.", features:SF, mensuel:"9", annuel:"90", install:"69" },
  sport_club: { nom:"Coach IA Club — jusqu'à 10 coachs", emoji:"🏆", desc:"Philomène assiste tous vos coachs — séances, schémas, prépa physique et communication avec les familles.", features:SF, mensuel:"15", annuel:"150", install:"99" },
  sport_pro: { nom:"Coach IA Club Pro — jusqu'à 20 coachs", emoji:"🥇", desc:"Philomène pour les grands clubs — jusqu'à 20 coachs connectés, toutes catégories, prépa physique complète.", features:SF, mensuel:"25", annuel:"250", install:"99" },
  sport_max: { nom:"Coach IA Club Max — Illimité", emoji:"🌟", desc:"Philomène pour les clubs ambitieux — coachs illimités, toutes fonctionnalités, support prioritaire.", features:["Coachs illimités","Séances complètes toutes catégories","Schémas d'exercices automatiques","Préparation physique et suivi","Rédaction des messages aux parents","Support prioritaire WhatsApp"], mensuel:"39", annuel:"390", install:"149" },
  beaute: {
    nom:"Assistant Beauté", emoji:"✂️",
    desc:"Philomène répond aux demandes de rendez-vous, donne vos tarifs et conseille vos clients automatiquement.",
    features:["Réponses aux demandes de RDV 24h/24","Tarifs et services automatiques","Conseils coupe ou tatouage par photo","Rédaction de messages clients","Zéro message sans réponse","Personnalisée à votre salon"],
    mensuel:"24", annuel:"240", install:"99"
  },
  autre: {
    nom:"Assistant Personnalisé", emoji:"✨",
    desc:"Philomène s'adapte à votre activité — elle répond à vos clients, gère les questions répétitives et vous libère du temps.",
    features:["Entièrement personnalisée à votre métier","Répond aux clients 24h/24","Gère les questions répétitives","Rédige vos messages et devis","Disponible sur votre site ou lien","Configuration complète incluse"],
    mensuel:"24", annuel:"240", install:"99"
  }
};

setTimeout(function() {
  var splash = document.getElementById("splash");
  splash.classList.add("gone");
  setTimeout(function() { splash.style.display = "none"; init(); }, 800);
}, 2800);

function addBotMsg(text, choices) {
  var wrap = document.createElement("div"); wrap.className = "bubble-wrap bot";
  var av = document.createElement("div"); av.className = "avatar"; av.textContent = "✨";
  var bbl = document.createElement("div"); bbl.className = "bubble bot"; bbl.textContent = text;
  if (choices && choices.length) {
    var div = document.createElement("div"); div.className = "choices";
    choices.forEach(function(c) {
      var btn = document.createElement("button"); btn.className = "choice-btn"; btn.textContent = c.label;
      btn.onclick = function() { btn.disabled = true; handleChoice(c.value, c.label); };
      div.appendChild(btn);
    });
    bbl.appendChild(div);
  }
  wrap.appendChild(av); wrap.appendChild(bbl);
  document.getElementById("messages").appendChild(wrap); scrollDown();
}

function addUserMsg(text) {
  var wrap = document.createElement("div"); wrap.className = "bubble-wrap user";
  var bbl = document.createElement("div"); bbl.className = "bubble user"; bbl.textContent = text;
  wrap.appendChild(bbl); document.getElementById("messages").appendChild(wrap); scrollDown();
}

function addDevisCard(key) {
  var t = TARIFS[key]; if (!t) return;
  var wrap = document.createElement("div"); wrap.className = "bubble-wrap bot";
  var av = document.createElement("div"); av.className = "avatar"; av.textContent = "✨";
  var bbl = document.createElement("div"); bbl.className = "bubble bot"; bbl.textContent = "Voici exactement ce que je peux faire pour vous 👇";
  var msg = "Bonjour ! Je viens du site Philomène I.A.\n\n";
  msg += "Je suis intéressé(e) par : " + t.emoji + " " + t.nom + "\n";
  if (profil.sport) msg += "Sport : " + profil.sport + "\n";
  if (profil.metier) msg += "Métier : " + profil.metier + "\n";
  if (profil.detail) msg += "Détail : " + profil.detail + "\n";
  msg += "\nPouvez-vous me contacter ? Merci 😊";
  var card = document.createElement("div"); card.className = "devis-card";
  card.innerHTML =
    '<div class="devis-nom">' + t.emoji + ' ' + t.nom + '</div>' +
    '<div class="devis-desc">' + t.desc + '</div>' +
    '<div class="devis-features">' + t.features.map(function(f){ return '<div class="devis-feature"><span class="check">✓</span><span>' + f + '</span></div>'; }).join("") + '</div>' +
    '<div class="devis-prix-wrap">' +
    '<div class="devis-prix"><div class="prix-label">Mensuel</div><div class="prix-val">' + t.mensuel + '€</div><div class="prix-unit">/ mois</div></div>' +
    '<div class="devis-prix"><div class="prix-label">Annuel</div><div class="prix-val">' + t.annuel + '€</div><div class="prix-unit">/ an • 2 mois offerts</div></div>' +
    '</div>' +
    '<div class="devis-install">Installation unique : <strong>' + t.install + '€</strong> — configuration complète incluse</div>' +
    '<a class="whatsapp-btn" href="https://wa.me/' + WHATSAPP_NUM + '?text=' + encodeURIComponent(msg) + '" target="_blank">💬 Je veux mon assistant Philomène !</a>';
  bbl.appendChild(card); wrap.appendChild(av); wrap.appendChild(bbl);
  document.getElementById("messages").appendChild(wrap); scrollDown();
}

function setTyping(on) {
  if (on) {
    var wrap = document.createElement("div"); wrap.className = "bubble-wrap bot"; wrap.id = "typing";
    wrap.innerHTML = '<div class="avatar">✨</div><div class="bubble bot"><div class="typing"><span></span><span></span><span></span></div></div>';
    document.getElementById("messages").appendChild(wrap); scrollDown();
  } else { var t = document.getElementById("typing"); if (t) t.remove(); }
}

function scrollDown() { setTimeout(function(){ document.getElementById("chat").scrollTop = 99999; }, 100); }
function sleep(ms) { return new Promise(function(r){ setTimeout(r, ms); }); }

async function init() {
  await sleep(400);
  addBotMsg("Bonjour ! 👋 Je suis Philomène.\n\nJe crée des assistants IA personnalisés pour les professionnels — disponibles 24h/24 pour répondre à vos clients.\n\nVous exercez quel métier ?", [
    { label:"🔧 Artisan — plombier, électricien, menuisier...", value:"artisan" },
    { label:"⚽ Coach sportif ou club", value:"sport" },
    { label:"✂️ Coiffeur, tatoueur, esthéticienne", value:"beaute" },
    { label:"🏥 Santé — kiné, infirmière, ostéo...", value:"sante" },
    { label:"🏢 Autre activité", value:"autre" }
  ]);
  etape = "accueil";
}

async function handleChoice(value, label) {
  addUserMsg(label); setTyping(true); await sleep(900); setTyping(false);

  if (etape === "accueil") {
    profil.type = value;
    if (value === "artisan") {
      etape = "artisan_metier";
      addBotMsg("Quel est votre métier ?", [
        { label:"🔧 Plombier", value:"Plombier" },
        { label:"⚡ Électricien", value:"Électricien" },
        { label:"🪵 Menuisier / Charpentier", value:"Menuisier" },
        { label:"🎨 Peintre / Carreleur", value:"Peintre" },
        { label:"🏠 Multi-services", value:"Artisan multi-services" },
        { label:"Autre métier", value:"Artisan" }
      ]);
    } else if (value === "sport") {
      etape = "sport_discipline";
      addBotMsg("Quel sport pratiquez-vous ?", [
        { label:"⚽ Football", value:"Football" },
        { label:"🥊 Boxe / Arts martiaux", value:"Boxe" },
        { label:"🏀 Basketball / Handball", value:"Basketball" },
        { label:"🎾 Tennis / Padel", value:"Tennis" },
        { label:"🏊 Natation / Athlétisme", value:"Athlétisme" },
        { label:"🏉 Autre sport", value:"Sport" }
      ]);
    } else if (value === "beaute") {
      etape = "beaute_fin";
      addBotMsg("Quelle est votre activité ?", [
        { label:"💇 Salon de coiffure", value:"Coiffeur" },
        { label:"🎨 Tatoueur / Piercing", value:"Tatoueur" },
        { label:"💅 Esthéticienne / Nail art", value:"Esthéticienne" },
        { label:"💈 Barbier", value:"Barbier" }
      ]);
    } else if (value === "sante") {
      etape = "sante_fin";
      addBotMsg("Quelle est votre spécialité ?", [
        { label:"🏥 Infirmière libérale", value:"Infirmière libérale" },
        { label:"💆 Kinésithérapeute", value:"Kinésithérapeute" },
        { label:"🦴 Ostéopathe", value:"Ostéopathe" },
        { label:"🥗 Naturopathe", value:"Naturopathe" }
      ]);
    } else {
      etape = "autre_libre";
      addBotMsg("Décrivez-moi votre activité en quelques mots 😊");
    }

  } else if (etape === "sport_discipline") {
    profil.sport = value;
    etape = "sport_formule";
    addBotMsg("Parfait ! Combien de coachs dans votre club de " + value + " ?", [
      { label:"🏃 Solo — 1 coach • 5€/mois", value:"sport_solo" },
      { label:"⚽ Mini Club — jusqu'à 5 coachs • 9€/mois", value:"sport_mini" },
      { label:"🏆 Club — jusqu'à 10 coachs • 15€/mois", value:"sport_club" },
      { label:"🥇 Club Pro — jusqu'à 20 coachs • 25€/mois", value:"sport_pro" },
      { label:"🌟 Club Max — Illimité • 39€/mois", value:"sport_max" }
    ]);

  } else if (etape === "sport_formule") {
    etape = "fin";
    addBotMsg("Excellent choix ! Voici votre formule Coach IA pour votre club de " + profil.sport + " :");
    await sleep(600); addDevisCard(value);

  } else if (etape === "artisan_metier") {
    profil.metier = value; etape = "artisan_probleme";
    addBotMsg("Quel est votre plus grand problème au quotidien ?", [
      { label:"📞 Trop d'appels pendant le travail", value:"appels" },
      { label:"⏰ Pas le temps de répondre aux clients", value:"temps" },
      { label:"💰 Faire des devis prend trop de temps", value:"devis" },
      { label:"😴 Clients qui écrivent hors horaires", value:"heures" }
    ]);

  } else if (etape === "artisan_probleme") {
    etape = "fin";
    addBotMsg("Je comprends parfaitement — c'est exactement pour ça que j'existe ! 💜\n\nEn tant que " + profil.metier + ", voici ce que Philomène fera pour vous :");
    await sleep(600); addDevisCard("artisan");

  } else if (etape === "beaute_fin") {
    profil.metier = value; etape = "fin";
    addBotMsg("En tant que " + value + ", voici comment Philomène peut vous aider :");
    await sleep(600); addDevisCard("beaute");

  } else if (etape === "sante_fin") {
    profil.metier = value; etape = "fin";
    addBotMsg("En tant que " + value + ", voici comment Philomène peut vous aider :");
    await sleep(600); addDevisCard("autre");
  }
}

async function handleUserInput(text) {
  if (!text.trim() || isLoading) return;
  addUserMsg(text);
  if (etape === "autre_libre") {
    profil.detail = text; etape = "fin";
    setTyping(true); await sleep(1200); setTyping(false);
    addBotMsg("Très bien ! Voici comment Philomène peut s'adapter à votre activité :");
    await sleep(400); addDevisCard("autre"); return;
  }
  isLoading = true; setTyping(true);
  try {
    var resp = await fetch(API_BASE + "/ask", {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ conversation:[
        { role:"system", content:"Tu es Philomène I.A., une assistante commerciale chaleureuse et élégante. Tu crées des assistants IA personnalisés pour les professionnels à des prix accessibles : de 5 à 39 euros par mois pour les clubs de sport, 24 euros par mois pour les artisans et autres. Tu réponds uniquement aux questions sur tes services de façon concise et rassurante." },
        { role:"user", content:text }
      ], userId:"philo_vitrine_" + Date.now() })
    });
    var data = await resp.json(); setTyping(false);
    addBotMsg(data.answer || "Dites-moi quel est votre métier et je vous montre comment je peux vous aider 😊");
  } catch(e) {
    setTyping(false);
    addBotMsg("Dites-moi quel est votre métier et je vous montre comment je peux vous aider 😊");
  }
  isLoading = false;
}

document.getElementById("sendBtn").addEventListener("click", function() {
  var text = document.getElementById("userInput").value.trim();
  if (!text) return; document.getElementById("userInput").value = ""; handleUserInput(text);
});
document.getElementById("userInput").addEventListener("keydown", function(e) {
  if (e.key === "Enter") {
    var text = e.target.value.trim();
    if (!text) return; e.target.value = ""; handleUserInput(text);
  }
});
</script>

</body>
</html>
