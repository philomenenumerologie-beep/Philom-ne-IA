<!DOCTYPE html>

<html lang="fr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Coach IA — Risquons-Tout Mouscron</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
:root {
  --red: #cc0000;
  --red2: #ff1a1a;
  --red-glow: rgba(204,0,0,0.3);
  --white: #ffffff;
  --bg-dark: #1a0000;
  --surface: rgba(30,0,0,0.92);
  --dim: #ffaaaa;
  --border: rgba(204,0,0,0.3);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  color: #fff; font-family: 'DM Sans', sans-serif;
  height: 100vh; display: flex; flex-direction: column;
  overflow: hidden; position: relative;
}

/* TERRAIN */
#pitch { position: fixed; inset: 0; z-index: 0; overflow: hidden; }
.pitch-bg {
width: 100%; height: 100%;
background: repeating-linear-gradient(180deg, #1a4a1a 0px, #1a4a1a 40px, #1e5c1e 40px, #1e5c1e 80px);
}
.pitch-svg { position: absolute; inset: 0; width: 100%; height: 100%; }
#overlay { position: fixed; inset: 0; z-index: 1; background: rgba(0,0,0,0.55); }

/* LOGIN */
#loginScreen {
position: fixed; inset: 0; z-index: 100;
display: flex; flex-direction: column;
align-items: center; justify-content: center; padding: 24px;
background: rgba(0,0,0,0.7);
}
.login-card {
background: rgba(255,255,255,0.1);
border: 1px solid rgba(204,0,0,0.4);
border-radius: 20px; padding: 28px 24px;
width: 100%; max-width: 380px;
box-shadow: 0 20px 40px rgba(0,0,0,0.6);
backdrop-filter: blur(20px);
}
.login-logo { text-align: center; margin-bottom: 20px; }
.login-badge { margin-bottom: 10px; }
.login-title {
font-family: ‘Barlow Condensed’, sans-serif;
font-size: 26px; font-weight: 800; color: #fff;
text-transform: uppercase; letter-spacing: 0.05em;
}
.login-club { font-size: 13px; color: var(–red2); font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; margin-top: 2px; }
.login-label { display: block; font-size: 12px; color: #ffaaaa; margin-bottom: 8px; margin-top: 16px; text-transform: uppercase; letter-spacing: 0.08em; }
.login-input {
width: 100%; background: rgba(255,255,255,0.12);
border: 1px solid rgba(204,0,0,0.4); border-radius: 12px;
padding: 14px 16px; color: #fff; -webkit-text-fill-color: #fff;
font-size: 16px; font-family: ‘DM Sans’, sans-serif;
outline: none; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 16px;
}
.login-input::placeholder { text-transform: none; letter-spacing: 0; color: rgba(255,255,255,0.4); }
.login-btn {
width: 100%; padding: 14px; background: var(–red);
border: none; border-radius: 12px; color: #fff;
font-size: 16px; font-weight: 700; cursor: pointer;
font-family: ‘DM Sans’, sans-serif;
box-shadow: 0 4px 16px var(–red-glow);
}
.login-error {
margin-top: 12px; padding: 10px 14px;
background: rgba(248,81,73,0.1); border: 1px solid rgba(248,81,73,0.3);
border-radius: 10px; color: #f85149; font-size: 13px; text-align: center; display: none;
}

/* TOPBAR */
#topbar {
position: relative; z-index: 10;
display: flex; align-items: center; justify-content: space-between;
padding: 10px 16px;
background: linear-gradient(135deg, rgba(10,0,0,0.98), rgba(40,0,0,0.98));
border-bottom: 3px solid var(–red);
box-shadow: 0 4px 20px rgba(0,0,0,0.8);
}
.logo-area { display: flex; align-items: center; gap: 12px; }
.logo-text { display: flex; flex-direction: column; }
.logo-name {
font-family: ‘Barlow Condensed’, sans-serif;
font-size: 18px; font-weight: 800; color: #fff;
letter-spacing: 0.08em; text-transform: uppercase;
text-shadow: 0 0 10px rgba(204,0,0,0.8);
}
.logo-club { font-size: 11px; color: var(–red2); letter-spacing: 0.1em; text-transform: uppercase; font-weight: 700; }
.status { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #ffaaaa; }
.dot-green { width: 7px; height: 7px; border-radius: 50%; background: #4ade80; box-shadow: 0 0 6px #4ade80; animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

/* BANNIERE */
#anniversary {
position: relative; z-index: 9;
text-align: center; padding: 4px;
background: linear-gradient(90deg, transparent, rgba(204,0,0,0.4), transparent);
font-family: ‘Barlow Condensed’, sans-serif;
font-size: 11px; color: rgba(255,200,200,0.8);
letter-spacing: 0.2em; text-transform: uppercase;
}

/* TABS MODE */
#modeBar {
position: relative; z-index: 9;
display: flex; background: rgba(10,0,0,0.9);
border-bottom: 1px solid rgba(204,0,0,0.2);
}
.mode-tab {
flex: 1; padding: 10px; text-align: center;
font-family: ‘Barlow Condensed’, sans-serif;
font-size: 14px; font-weight: 700;
color: rgba(255,255,255,0.5); cursor: pointer;
letter-spacing: 0.05em; text-transform: uppercase;
border-bottom: 3px solid transparent;
transition: all 0.2s;
}
.mode-tab.active { color: #fff; border-bottom-color: var(–red); }

/* CATEGORIES */
#catBar {
position: relative; z-index: 9;
display: flex; gap: 8px; padding: 8px 14px;
background: rgba(5,0,0,0.8);
border-bottom: 1px solid rgba(204,0,0,0.15);
overflow-x: auto; scrollbar-width: none;
}
#catBar::-webkit-scrollbar { display: none; }
.cat-chip {
padding: 5px 12px; border-radius: 20px;
background: rgba(255,255,255,0.07); border: 1px solid rgba(204,0,0,0.2);
color: #ffaaaa; font-family: ‘Barlow Condensed’, sans-serif;
font-size: 13px; font-weight: 600; cursor: pointer; white-space: nowrap;
}
.cat-chip.active { background: var(–red); border-color: var(–red); color: #fff; }

/* SECTIONS */
#sectionCoach { display: flex; flex-direction: column; flex: 1; overflow: hidden; }
#sectionPrepa { display: none; flex-direction: column; flex: 1; overflow: hidden; }

/* CHAT */
#chat, #chatPrepa {
flex: 1; overflow-y: auto;
padding: 16px 14px 120px; position: relative; z-index: 2;
}

.bubble-wrap { display: flex; margin-bottom: 14px; animation: fadeUp 0.3s ease; }
@keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
.bubble-wrap.bot { justify-content: flex-start; }
.bubble-wrap.user { justify-content: flex-end; }
.avatar {
width: 32px; height: 32px; border-radius: 50%;
background: rgba(0,0,0,0.7); border: 1.5px solid var(–red);
display: flex; align-items: center; justify-content: center;
flex-shrink: 0; margin-right: 8px; margin-top: 2px; overflow: hidden;
}
.bubble {
max-width: min(85%, 360px); padding: 11px 14px; border-radius: 16px;
font-size: 14px; line-height: 1.6; white-space: pre-wrap;
}
.bubble.bot {
background: rgba(20,0,0,0.92); border: 1px solid rgba(204,0,0,0.2);
border-top-left-radius: 4px; color: #fff; -webkit-text-fill-color: #fff;
}
.bubble.user {
background: rgba(100,0,0,0.8); border: 1px solid rgba(204,0,0,0.4);
border-top-right-radius: 4px; color: #fff; -webkit-text-fill-color: #fff;
}
.quick-actions { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
.qa-btn {
padding: 8px 12px; background: rgba(204,0,0,0.15);
border: 1px solid rgba(204,0,0,0.3); border-radius: 20px;
color: #fff; font-size: 13px; cursor: pointer; font-family: ‘DM Sans’, sans-serif;
}

/* SCHEMA */
.schema-wrap { margin-top: 12px; border-radius: 12px; overflow: hidden; border: 1px solid rgba(204,0,0,0.3); }
.schema-header { padding: 8px 12px; background: rgba(204,0,0,0.2); font-size: 11px; color: #ff6666; text-transform: uppercase; letter-spacing: 0.1em; font-weight: 600; }
.schema-desc { padding: 5px 12px 8px; background: rgba(0,0,0,0.4); font-size: 12px; color: #ffaaaa; font-style: italic; }
.schema-svg-box svg { width: 100%; display: block; }
.schema-legend { display: flex; gap: 12px; padding: 6px 12px 8px; background: rgba(0,0,0,0.4); font-size: 10px; color: rgba(255,255,255,0.6); flex-wrap: wrap; }
.legend-item { display: flex; align-items: center; gap: 4px; }

/* PREPA PHYSIQUE */
.result-card {
background: rgba(30,0,0,0.8); border: 1px solid rgba(204,0,0,0.3);
border-radius: 14px; padding: 14px; margin-top: 10px;
}
.card-title { font-size: 12px; font-weight: 700; color: var(–red2); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 10px; }
.player-table { width: 100%; border-collapse: collapse; margin-top: 8px; }
.player-table th { background: var(–red); color: #fff; padding: 6px 8px; font-size: 11px; text-align: left; font-weight: 600; }
.player-table td { padding: 6px 8px; font-size: 12px; border-bottom: 1px solid rgba(204,0,0,0.15); color: #fff; -webkit-text-fill-color: #fff; }
.player-table tr:nth-child(even) td { background: rgba(204,0,0,0.08); }
.badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 700; }
.badge-green { background: rgba(46,160,67,0.2); color: #4ade80; }
.badge-orange { background: rgba(255,165,0,0.2); color: #ffa500; }
.badge-red { background: rgba(204,0,0,0.2); color: #ff6666; }
.stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
.stat-box { background: rgba(0,0,0,0.4); border-radius: 10px; padding: 10px 12px; border: 1px solid rgba(204,0,0,0.2); }
.stat-label { font-size: 10px; color: #ffaaaa; text-transform: uppercase; letter-spacing: 0.05em; }
.stat-value { font-size: 18px; font-weight: 700; color: #fff; margin-top: 2px; }
.stat-unit { font-size: 12px; color: #ffaaaa; }
.prog-item { display: flex; gap: 10px; padding: 8px 0; border-bottom: 1px solid rgba(204,0,0,0.15); font-size: 13px; color: #fff; }
.prog-num { width: 24px; height: 24px; border-radius: 50%; background: var(–red); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; flex-shrink: 0; }

/* TYPING */
.typing { display:flex; gap:4px; padding:12px 14px; }
.typing span { width:6px; height:6px; border-radius:50%; background:var(–dim); animation: bounce 1.2s infinite; }
.typing span:nth-child(2){animation-delay:0.2s}
.typing span:nth-child(3){animation-delay:0.4s}
@keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-6px)}}

/* COMPOSER */
#composer {
position: fixed; bottom: 0; left: 0; right: 0; z-index: 10;
padding: 10px 12px 18px;
background: linear-gradient(to top, rgba(10,0,0,0.97) 70%, transparent);
}
.composer-inner {
display: flex; align-items: center; gap: 8px;
background: rgba(30,0,0,0.95); border: 1px solid rgba(204,0,0,0.3);
border-radius: 22px; padding: 8px 12px;
}
.composer-input {
flex: 1; background: transparent; border: none; outline: none;
color: #fff; -webkit-text-fill-color: #fff;
font-size: 15px; font-family: ‘DM Sans’, sans-serif;
}
.composer-input::placeholder { color: #ffaaaa; -webkit-text-fill-color: #ffaaaa; }
.send-btn {
width: 38px; height: 38px; border-radius: 50%;
background: var(–red); border: none; color: #fff;
font-size: 16px; display: flex; align-items: center; justify-content: center;
cursor: pointer; flex-shrink: 0; box-shadow: 0 4px 12px var(–red-glow);
}
</style>

</head>

<script>
const API_BASE = "https://philo-backend-by2c.onrender.com";
const COACH_URL = API_BASE + "/coach";

let clubKey = localStorage.getItem("rt_club_key") || "";
let deviceId = localStorage.getItem("rt_device_id");
if (!deviceId) { deviceId = "device_" + Math.random().toString(36).slice(2,12); localStorage.setItem("rt_device_id", deviceId); }
let categorie = "U8/U9";
let userId = "rt_" + (localStorage.getItem("rt_user_id") || Math.random().toString(36).slice(2,10));
localStorage.setItem("rt_user_id", userId.replace("rt_",""));
let isLoading = false;
let currentMode = "coach";

// ===== MODE SWITCH =====
function switchMode(mode, el) {
  currentMode = mode;
  document.querySelectorAll(".mode-tab").forEach(t => t.classList.remove("active"));
  el.classList.add("active");
  if (mode === "coach") {
    document.getElementById("sectionCoach").style.display = "flex";
    document.getElementById("sectionPrepa").style.display = "none";
    document.getElementById("userInput").placeholder = "Ex: séance dribble, 12 joueurs, 1h…";
  } else {
    document.getElementById("sectionCoach").style.display = "none";
    document.getElementById("sectionPrepa").style.display = "flex";
    document.getElementById("userInput").placeholder = "Ex: Test bip Yanis niveau 12 palier 3…";
    if (document.getElementById("messagesPrepa").children.length === 0) {
      addBotMsgPrepa("Bonjour ! 💪 Je suis votre assistant préparation physique de Risquons-Tout Mouscron.\n\nEntrez vos résultats de tests ou demandez un programme personnalisé !", true);
    }
  }
}

// ===== SCHEMA SVG PRO =====
function buildProSchema(schema) {
  if (!schema) return null;
  const W = 320, H = 220;
  function px(p) { return 10 + p * (W-20) / 100; }
  function py(p) { return 10 + p * (H-20) / 100; }
  const PLAYER_COLOR = "#cc0000";
  const PLOT_COLOR = "#ffffff";
  const BALL_PATH = "#ffffff";
  const MOVE_PATH = "#ff6666";
  let defs = '<defs>';
  defs += '<marker id="arrowBall" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="' + BALL_PATH + '" opacity="0.9"/></marker>';
  defs += '<marker id="arrowMove" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="' + MOVE_PATH + '"/></marker>';
  defs += '</defs>';
  let elements = [];
  elements.push('<rect width="' + W + '" height="' + H + '" fill="#1a4a1a" rx="8"/>');
  elements.push('<defs><pattern id="grassRT" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse"><rect width="40" height="40" fill="#1a4a1a"/><rect width="40" height="20" fill="#1e5c1e"/></pattern></defs>');
  elements.push('<rect width="' + W + '" height="' + H + '" fill="url(#grassRT)" rx="8"/>');
  elements.push('<rect x="5" y="5" width="' + (W-10) + '" height="' + (H-10) + '" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1.5" rx="3"/>');
  const pos = {};
  if (schema.players) schema.players.forEach(p => { pos[p.id] = [px(p.x), py(p.y)]; });
  if (schema.plots) schema.plots.forEach((p,i) => { pos["plot_"+i] = [px(p.x), py(p.y)]; });
  if (schema.goal) {
    const gx = px(schema.goal.x), gy = py(schema.goal.y);
    elements.push('<rect x="' + (gx-22) + '" y="' + (gy-6) + '" width="44" height="12" fill="none" stroke="white" stroke-width="2" rx="1"/>');
    elements.push('<text x="' + gx + '" y="' + (gy+22) + '" text-anchor="middle" font-size="8" fill="white" font-weight="bold">BUT</text>');
  }
  if (schema.ball_paths) {
    schema.ball_paths.forEach(path => {
      const f = pos[path.from], t = pos[path.to];
      if (!f || !t) return;
      elements.push('<line x1="' + f[0] + '" y1="' + f[1] + '" x2="' + t[0] + '" y2="' + t[1] + '" stroke="' + BALL_PATH + '" stroke-width="2.5" stroke-dasharray="7,4" marker-end="url(#arrowBall)"/>');
    });
  }
  if (schema.player_paths) {
    schema.player_paths.forEach(path => {
      const f = pos[path.from], t = pos[path.to];
      if (!f || !t) return;
      elements.push('<line x1="' + f[0] + '" y1="' + f[1] + '" x2="' + t[0] + '" y2="' + t[1] + '" stroke="' + MOVE_PATH + '" stroke-width="2" marker-end="url(#arrowMove)"/>');
    });
  }
  if (schema.plots) {
    schema.plots.forEach(p => {
      const x = px(p.x), y = py(p.y);
      elements.push('<polygon points="' + x + ',' + (y-7) + ' ' + (x-5) + ',' + (y+4) + ' ' + (x+5) + ',' + (y+4) + '" fill="' + PLOT_COLOR + '" stroke="rgba(0,0,0,0.3)" stroke-width="0.5"/>');
    });
  }
  if (schema.players) {
    schema.players.forEach(p => {
      const x = px(p.x), y = py(p.y);
      elements.push('<circle cx="' + x + '" cy="' + y + '" r="10" fill="' + PLAYER_COLOR + '" stroke="white" stroke-width="1.5"/>');
      elements.push('<text x="' + x + '" y="' + (y+4) + '" text-anchor="middle" font-size="8" font-weight="bold" fill="white">' + p.id + '</text>');
    });
  }
  if (schema.distance) {
    elements.push('<rect x="5" y="' + (H-18) + '" width="' + (W-10) + '" height="14" fill="rgba(0,0,0,0.6)" rx="2"/>');
    elements.push('<text x="' + (W/2) + '" y="' + (H-8) + '" text-anchor="middle" font-size="9" fill="rgba(255,255,255,0.9)">' + schema.distance + '</text>');
  }
  return '<svg viewBox="0 0 ' + W + ' ' + H + '" xmlns="http://www.w3.org/2000/svg">' + defs + elements.join("") + '</svg>';
}

function renderSchema(schema) {
  if (!schema) return "";
  const svgHtml = buildProSchema(schema);
  if (!svgHtml) return "";
  return '<div class="schema-wrap">' +
    '<div class="schema-header">📐 Schéma de l\'exercice</div>' +
    (schema.description ? '<div class="schema-desc">' + schema.description + '</div>' : '') +
    '<div class="schema-svg-box">' + svgHtml + '</div>' +
    '<div class="schema-legend">' +
    '<div class="legend-item"><svg width="14" height="14"><circle cx="7" cy="7" r="6" fill="#cc0000" stroke="white" stroke-width="1"/></svg> Joueur</div>' +
    '<div class="legend-item"><svg width="14" height="14"><polygon points="7,1 2,12 12,12" fill="white"/></svg> Plot</div>' +
    '<div class="legend-item"><svg width="22" height="10"><line x1="0" y1="5" x2="18" y2="5" stroke="white" stroke-width="2.5" stroke-dasharray="5,3"/></svg> Ballon</div>' +
    '<div class="legend-item"><svg width="22" height="10"><line x1="0" y1="5" x2="18" y2="5" stroke="#ff6666" stroke-width="2"/></svg> Déplacement</div>' +
    '</div></div>';
}

// ===== LOGIN =====
const loginScreen = document.getElementById("loginScreen");
const loginBtn = document.getElementById("loginBtn");
const clubKeyInput = document.getElementById("clubKeyInput");
const loginError = document.getElementById("loginError");

async function tryLogin() {
  const key = clubKeyInput.value.trim().toUpperCase();
  if (!key) { loginError.textContent = "Entrez votre clé."; loginError.style.display = "block"; return; }
  loginBtn.textContent = "Vérification…";
  loginBtn.disabled = true;
  loginError.style.display = "none";
  try {
    const resp = await fetch(API_BASE + "/prepa", {

      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message: "Bonjour", userId, categorie, clubKey: key, deviceId })
    });
    const data = await resp.json();
    if (!resp.ok) {
      loginError.textContent = data.error || "Clé invalide.";
      loginError.style.display = "block";
      loginBtn.textContent = "Accéder ⚽";
      loginBtn.disabled = false;
      return;
    }
    clubKey = key;
    localStorage.setItem("rt_club_key", clubKey);
    loginScreen.style.display = "none";
    addBotMsg("Bienvenue Coach ! ⚽\n\nJe suis Coach IA, votre assistant football de Risquons-Tout Mouscron.\n\nChoisissez votre catégorie et dites-moi ce que vous voulez travailler !", null, true);
  } catch {
    loginError.textContent = "Erreur de connexion.";
    loginError.style.display = "block";
    loginBtn.textContent = "Accéder ⚽";
    loginBtn.disabled = false;
  }
}

loginBtn.addEventListener("click", tryLogin);
clubKeyInput.addEventListener("keydown", e => { if (e.key === "Enter") tryLogin(); });
if (clubKey) { clubKeyInput.value = clubKey; tryLogin(); }

function selectCat(el, cat) {
  document.querySelectorAll(".cat-chip").forEach(c => c.classList.remove("active"));
  el.classList.add("active");
  categorie = cat;
  addBotMsg("Catégorie : " + cat + " ⚽ Je m'adapte !", null, false);
}

// ===== CHAT COACH =====
const chat = document.getElementById("chat");
const messages = document.getElementById("messages");

function addBotMsg(text, schema, withActions) {
  const wrap = document.createElement("div");
  wrap.className = "bubble-wrap bot";
  const bubble = document.createElement("div");
  bubble.className = "bubble bot";
  bubble.textContent = text;
  if (schema) bubble.insertAdjacentHTML("beforeend", renderSchema(schema));
  if (withActions) {
    const actions = document.createElement("div");
    actions.className = "quick-actions";
    actions.innerHTML =
      '<button class="qa-btn" onclick="sendMessage(\'Seance dribble 12 joueurs 1h\')">🏃 Dribble</button>' +
      '<button class="qa-btn" onclick="sendMessage(\'Seance passe triangle 10 joueurs 45min\')">⚡ Passe</button>' +
      '<button class="qa-btn" onclick="sendMessage(\'Seance tir au but 14 joueurs 1h\')">🎯 Tir</button>' +
      '<button class="qa-btn" onclick="sendMessage(\'Seance pressing collectif 1h\')">🛡️ Pressing</button>' +
      '<button class="qa-btn" onclick="sendMessage(\'Redige message WhatsApp convocation match samedi 10h\')">📢 Parents</button>';
    bubble.appendChild(actions);
  }
  const avatar = document.createElement("div");
  avatar.className = "avatar";
  avatar.innerHTML = '<svg width="28" height="28" viewBox="0 0 100 100"><circle cx="50" cy="50" r="48" fill="#111" stroke="#cc0000" stroke-width="3"/><text x="50" y="58" text-anchor="middle" font-family="Arial Black" font-size="28" font-weight="900" fill="white">RT</text></svg>';
  wrap.appendChild(avatar);
  wrap.appendChild(bubble);
  messages.appendChild(wrap);
  chat.scrollTop = chat.scrollHeight;
}

function addUserMsg(text) {
  const wrap = document.createElement("div");
  wrap.className = "bubble-wrap user";
  const bubble = document.createElement("div");
  bubble.className = "bubble user";
  bubble.textContent = text;
  wrap.appendChild(bubble);
  messages.appendChild(wrap);
  chat.scrollTop = chat.scrollHeight;
}

function setTyping(on) {
  const container = currentMode === "coach" ? messages : document.getElementById("messagesPrepa");
  const scrollEl = currentMode === "coach" ? chat : document.getElementById("chatPrepa");
  if (on) {
    const wrap = document.createElement("div");
    wrap.className = "bubble-wrap bot";
    wrap.id = "typingIndicator";
    wrap.innerHTML = '<div class="avatar"><svg width="28" height="28" viewBox="0 0 100 100"><circle cx="50" cy="50" r="48" fill="#111" stroke="#cc0000" stroke-width="3"/><text x="50" y="58" text-anchor="middle" font-family="Arial Black" font-size="28" font-weight="900" fill="white">RT</text></svg></div><div class="bubble bot"><div class="typing"><span></span><span></span><span></span></div></div>';
    container.appendChild(wrap);
    scrollEl.scrollTop = scrollEl.scrollHeight;
  } else {
    const t = document.getElementById("typingIndicator");
    if (t) t.remove();
  }
}

// ===== SEND =====
async function sendMessage(text) {
  if (!text || isLoading) return;
  if (!clubKey) { loginScreen.style.display = "flex"; return; }
  addUserMsg(text);
  isLoading = true;
  setTyping(true);
  try {
    const resp = await fetch(COACH_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message: text, userId, categorie, clubKey, deviceId })
    });
    const data = await resp.json();
    setTyping(false);
    if (!resp.ok) {
      addBotMsg("Erreur : " + (data.error || "Problème de connexion."), null, false);
    } else {
      addBotMsg(data.answer || "Pas de réponse.", data.schema || null, false);
    }
  } catch {
    setTyping(false);
    addBotMsg("Erreur de connexion.", null, false);
  }
  isLoading = false;
}

async function sendMessagePrepa(text) {
  if (!text || isLoading) return;
  if (!clubKey) { loginScreen.style.display = "flex"; return; }
  addUserMsgPrepa(text);
  isLoading = true;
  setTyping(true);
  const prepaMessage = "[PREPARATION PHYSIQUE RT MOUSCRON] " + text;
  try {
    const resp = await fetch(COACH_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message: prepaMessage, userId: userId + "_prepa", categorie, clubKey, deviceId })
    });
    const data = await resp.json();
    setTyping(false);
    if (!resp.ok) {
      addBotMsgPrepa("Erreur : " + (data.error || "Problème de connexion."), false);
    } else {
      addBotMsgPrepa(data.answer || "Pas de réponse.", false);
    }
  } catch {
    setTyping(false);
    addBotMsgPrepa("Erreur de connexion.", false);
  }
  isLoading = false;
}

const userInput = document.getElementById("userInput");
document.getElementById("sendBtn").addEventListener("click", () => {
  const text = userInput.value.trim();
  if (!text) return;
  userInput.value = "";
  if (currentMode === "coach") sendMessage(text);
  else sendMessagePrepa(text);
});
userInput.addEventListener("keydown", e => {
  if (e.key === "Enter") {
    const text = userInput.value.trim();
    if (!text) return;
    userInput.value = "";
    if (currentMode === "coach") sendMessage(text);
    else sendMessagePrepa(text);
  }
});
</script>
